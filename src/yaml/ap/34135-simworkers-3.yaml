    ▪ A\_1P\_Mechanic#1\_screwing  
    ▪ A\_1P\_Mechanic#2\_laying  
    ▪ A\_1P\_Mechanic#3\_lifting  
    ▪ A\_1P\_Mechanic#4\_openingbolts  
    ▪ A\_1P\_Mechanic#5\_wrench

    Electricians

