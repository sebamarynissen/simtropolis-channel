group: ap
name: simworkers-3
version: "1.0.1"
subfolder: 180-flora
info:
  summary: A_1P SimWorkers_3
  description: |-
    **Description**

    These are some SimWorkers to bring a little bit of action to your lots. This 3rd pack contains 5 different groups of workers:  
    • 5 Mechanics (groups)  
    • 5 Electricians  
    • 6 Warehouse Workers  
    • 4 Delivery Workers (DHL, UPS)  
    • 6 Mailmen (US Mail, Deutsche Post)

    **Scale and Size**

    I have set the height of the Sims to 2.3m + PPE (personal protective equipment). Therefor they are more realistic in size, compared to other small props like cars etc. They are a little smaller than the standard Maxis Sim.

    **Content**

    This File contains one .dat-File with 26 different props:  
    Mechanics

