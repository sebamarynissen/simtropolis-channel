info:
  summary: A_1P Cardinal Buoys
  description: |-
    Cardinal buoys indicate an obstacle and the direction to use to safely pass it. They do indicate this by two cones, a colour coding and different flashing intervals at night. For those with nautical interest, more info can easily be found [here](https://en.wikipedia.org/wiki/Cardinal_mark).  
    You can use them to decorate your shoreline and make sure your ships steer clear of any danger zones and shallows.

    ![Buoys-preview-2.png](https://i.postimg.cc/L6xbHXdR/Buoys-preview-2.png)

    **Content**  
    This File contains 4 lots:
    -   A\_1P\_CardinalBuoy\_N: Two cones pointing upward, black-yellow
    -   A\_1P\_CardinalBuoy\_E: Two cones pointing away from each other, black-yellow-black
    -   A\_1P\_CardinalBuoy\_S: Two cones pointing down, yellow-black
    -   A\_1P\_CardinalBuoy\_W: Two cones pointing towards each other, yellow-black-yellow

    **Dependencies**
    -   none
