    ![banner_Vol31.png.5971e0fb5fbeb99c64b0041](https://www.simtropolis.com/objects/screens/monthly_2024_09/banner_Vol31.png.5971e0fb5fbeb99c64b0041ac7de2901.png)

    **Propulsion Pack**

    The Age of the Dreadnought and the two decades before it, encompassed a period of scientific and industrial growth unrivalled by anything that came before it - quite possibly including the original Industrial Revolution of the mid-19th Century. The political/military rivalries of the era drove scientific advances every bit as much, if not more, than the needs of commerce and civilization. For warships it meant they had to be bigger, faster, tougher, and more offensively oriented. The need for tactical supremacy at sea naturally led to steel hulls, greater speed, heavy armour protection (advanced metallurgy), modern long-range naval artillery, rudimentary ship-to-ship communication (wireless), advanced optical instruments - and especially high-speed steam turbines.

    In an effort to take in-game realism to a new level, “AP” has provided us with all the basic components of a warship’s drive-train - boilers for steam - steam turbines - a reduction gearing system - propeller shafts - and propellers. This will allow you to assemble shipyards with factories and machine shops to build and produce these components - transport the components - and stockpile them alongside the builder’s slipway and dry docks. For those of you looking for a new industry for your cities - why not maritime machine shops or naval armaments?

    ![image.png.2ad875f47eac64f475f1abdb44ef4028.png](https://www.simtropolis.com/objects/attachments/monthly_2024_09/image.png.2ad875f47eac64f475f1abdb44ef4028.png)

    **How to use**

    This pack contains .SC4model-files and props as .SC4desc-files. So, by installing this pack nothing will directly appear in your game. You can use the props on your own lots or convert the SC4models into buildings, as you please. Since most props are to be used on water lots and props naturally align with the surface level, they will sink to the sea floor, if you do not stick to the guidelines on how to use [props on water lots](https://community.simtropolis.com/omnibus/simcity-4/bat-lot-editor-tutorials/tutorial-for-props-on-water-r852/). Finally you will need to follow the [instructions on how to make a lot transparent](https://community.simtropolis.com/forums/topic/37597-sc4dot-sign-shop/?do=findComment&comment=1030546). You will find the props in any Lot-Editor under the prefix **A\_1P\_h\_**

    **As per request from the community, I have also included a version of the ship without historic flags and crew.**

    **Please visit [@Dreadnought](https://community.simtropolis.com/profile/683435-dreadnought/)'s CJ to get detailed descriptions and the historical backgrounds to these prop packs. You will see a wonderful display of the results of our long collaboration there and can get a preview of what might be hidden in the coming prop packs or simply get some inspiration for your own harbour!**

    [https://community.simtropolis.com/journals/journal/6006-imperial-dockyards-cuxhaven/?do=embed](https://community.simtropolis.com/journals/journal/6006-imperial-dockyards-cuxhaven/?do=embed)
