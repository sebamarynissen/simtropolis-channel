    **Motor Lighter “Ajax”**

    Lighters were quite commonly found in every harbor the world over. They were extremely useful vessels and came in many different forms. The vast majority of lighters were simply towed barges, while others - with a primitive sail rig - were capable of proceeding under their own power. The least numerous of all lighter types was the “Motor Lighter”. Motor Lighters were usually slightly longer and a bit wider than the other two types, and they were equipped with their own steam engine, allowing them to proceed without regard to the wind and tide.

    Some Motor Lighters were special, one-off designs, specifically built for the purpose of transporting large and bulky cargo -- assembled engines - propeller shafts - partially assembled sections of gun turret machinery - sections of steam turbines, etc, etc. One such Motor Lighter was operated by the Dockyards in Wilhelmshaven, but there was only one photo available, and it was a very bad image. What it did show, was an extremely dull and boring, flat-decked, steam-powered lighter. The model of the “Motor Lighter Ajax” is an amalgamation of that lighter and a large, steam-powered, floating crane operated by the Philadelphia Navy Yard from 1918 to 1956. “Ajax” has an elevated bridge up forward for navigation purposes, with a large, flat cargo deck amidships, and a small superstructure in the stern. “AP’s” beautiful little model comes with an open cargo deck, but as the attached pictures show, almost anything can be placed in the cargo space. All 3-D models have varying degrees of “LOD” interference, but careful placement of the prop cargo can give you a unique, functional, Motor Lighter.

    ![image.png.fa02b04596c86ed92d746a023bd036ee.png](https://www.simtropolis.com/objects/attachments/monthly_2024_11/image.png.fa02b04596c86ed92d746a023bd036ee.png)

    **How to use**

    This pack contains .SC4model-files and props as .SC4desc-files. So, by installing this pack nothing will directly appear in your game. You can use the props on your own lots or convert the SC4models into buildings, as you please. Since most props are to be used on water lots and props naturally align with the surface level, they will sink to the sea floor, if you do not stick to the guidelines on how to use [props on water lots](https://community.simtropolis.com/omnibus/simcity-4/bat-lot-editor-tutorials/tutorial-for-props-on-water-r852/). Finally you will need to follow the [instructions on how to make a lot transparent](https://community.simtropolis.com/forums/topic/37597-sc4dot-sign-shop/?do=findComment&comment=1030546). You will find the props in any Lot-Editor under the prefix **A\_1P\_h\_**

    **As per request from the community, I have also included a version of the ship without historic flags and crew.**

    **Please visit [@Dreadnought](https://community.simtropolis.com/profile/683435-dreadnought/)'s CJ to get detailed descriptions and the historical backgrounds to these prop packs. You will see a wonderful display of the results of our long collaboration there and can get a preview of what might be hidden in the coming prop packs or simply get some inspiration for your own harbour!**

