    **Dependencies**  
    • none

    **Instructions**  
    This is a prop file! The content must be placed on your lot using a lot-editor!  
    Unzip and place in (work-) plugin folder, place in plugin folder once used in a lot file, eg.:  
    C:/Users//Documents/SimCity 4/Plugins

    **Note**

    I have set the height of the Sims to 2.3m + PPE (personal protective equipment). Therefor they are more realistic in size compared to other small props like cars etc. They are a little smaller than the standard Maxis Sim.  
    For spraying and fire you can play with the Maxis props Effect\_SmallFountain A B C, Effect\_firehydrant, Effect\_tinyfire, Effect\_tinyfire-night.
