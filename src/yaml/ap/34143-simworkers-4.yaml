  summary: A_1P SimWorkers_4 - First Responders
  description: |-
    These are some Sim-FirstResponders to bring a little bit of action to your lots. This 4th pack of workers contains 3 different groups of Sims:

    -   10 European Fire Fighters (black Nomex, 1x300bar CABA)
    -   10 US Fire Fighters (beige Nomex, 1x300bar CABA)
    -   8 EMTs

    **Content**

    This File contains one .dat-File with 28 different props:

