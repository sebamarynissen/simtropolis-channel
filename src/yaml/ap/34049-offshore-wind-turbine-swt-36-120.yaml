  summary: A_1P Offshore Wind Turbine SWT-3.6-120
  description: |-
    This is an offshore wind turbine generator (WTG) as it is widely distributed in European offshore windfarms. It is inspired by the SIEMENS wind turbine 3.6MW with a rotor diameter of 120m known as SWT-3.6-120.

    ![deutsche_windtechnik_20190425.jpg](https://w3.windfair.net/uploads/notice/preview/31349/deutsche_windtechnik_20190425.jpg)

    source: windfair.net (14.01.2021) [https://w3.windfair.net/wind-energy/pr/31349-deutsche-windtechnik-siemens-riffgat-offshore-wind-farm-turbine-ewe-maintenance-service-provider](https://w3.windfair.net/wind-energy/pr/31349-deutsche-windtechnik-siemens-riffgat-offshore-wind-farm-turbine-ewe-maintenance-service-provider)

    This File contains one wind power plant on a 1x1 lot (located in the power plant menu) with a production of 3600 and O&M costs of 125$.

    Below is some inspiration how to use it.

    ![Windfarm_Preview1.jpg.790a9662a788054ef3d54b4acffbd543.jpg](https://www.simtropolis.com/objects/attachments/monthly_2021_02/Windfarm_Preview1.jpg.790a9662a788054ef3d54b4acffbd543.jpg)

    ![Offshore-WTG-preview-4.png](https://i.postimg.cc/Gpb2crGN/Offshore-WTG-preview-4.png)

    Thanks to the simtropolis and sc4devotion community especially Simmer2 for lots of support, patience and advice during the creation of this lot.
  author: AP
