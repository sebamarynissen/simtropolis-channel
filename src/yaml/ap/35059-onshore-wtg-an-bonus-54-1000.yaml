info:
  summary: A_1P Onshore WTG AN BONUS 54-1000
  description: |-
    ## Description

    This is the model of a 1 MW onshore wind turbine based on an [AN BONUS 54-1000](https://www.wind-turbine-models.com/turbines/396-an-bonus-1000-54). It has a rotor diameter of 54m and a hub height of 60m (for these specific models I made). With this turbine I wanted to contribute a smaller and older WTG that can more easily be integrated in your wide country sides than some of the other, rather large models I made.

    The control type of this turbine is [active stall](https://windurance.com/2020/10/15/applications-for-stall-and-pitch-control-in-wind-turbines/), which means the trailing edge of the rotor blades can be rotated into the wind and face forward if the wind is too strong and the turbine needs to be stopped. You are able to see it at the model that is under maintenance and has a locked rotor.

    **Content**

    This File contains two wind power plant lots appearing in your power plant menu, one for the producing turbine with 5 different rotor rotation angles that change automatically when plopped and one lot with a WTG that is undergoing maintenance. The production is set to 1000 and the O&M costs are 40$ per month. One turbine is undergoing maintenance and has no power output.

    ##  ![image.png.f8f8e4d2003f84b49fe08b157139338c.png](https://www.simtropolis.com/objects/attachments/monthly_2022_04/image.png.f8f8e4d2003f84b49fe08b157139338c.png)

    ## A\_1P AN BONUS 54/1000

    ·         5 different rotor blade positions

    ![image.png.688780df14d9c0e0bcb53642d64da6c6.png](https://www.simtropolis.com/objects/attachments/monthly_2022_04/image.png.688780df14d9c0e0bcb53642d64da6c6.png)

    ## A\_1P AN BONUS 54/1000 under maintenance

    ·         at maintenance: Rotor locked in y-position, nacelle hatches open, personnel working on HSS coupling[\[1\]](#_ftn1)

    ## Dependencies

    ·         [SM2 Mega Prop Pack Vol1](https://www.sc4devotion.com/csxlex/lex_filedesc.php?lotGET=3640) for the truck parked under the turbine at maintenance

    ## Instructions

    Unzip and place in plugin folder, eg.:

    C:/Users//Documents/SimCity 4/Plugins

    * * *

    [\[1\]](#_ftnref1) HSS coupling (high speed shaft) between HSS gearbox output shaft with break disc and generator input shaft

