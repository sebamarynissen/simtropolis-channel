info:
  summary: A_1P Onshore WTG N117
  description: |-
    This is the model of a 2.4 MW onshore wind turbine based on a Nordex N117 Gamma©. It has a rotor diameter of 117m and at a hub height of 141m (for these specific models I made). Whereas the N117 comes in different power ratings, this turbine is part of the [Gamma class](https://www.nordex-online.com/en/product/n117-2400/) and slightly smaller than the [Delta class](https://www.nordex-online.com/en/product/n117-3600/).

    The cool thing about this turbine is that in the centre of the hub in the front is a window that allows you a nice view when working in there. It is used as an emergency exit from the hub at the same time (yes, you do have to rappel down the turbine)

    ![getfoto-3PrJt7dBtWP-turbine-nordex_n-117](https://www.wind-turbine-models.com/getfoto-3PrJt7dBtWP-turbine-nordex_n-117-gamma.jpg)

    ## Content

    This File contains four wind power plant lots with the same turbine type at different rotor positions, with a small transformer station next to the turbine.

    The production is set to 2400 and the O&M costs are 100$ per month. One turbine is undergoing maintenance and has no power output and zero budget impact.

    ![Icon_r1_res.png.f4932ca4dc9750534d5ffaf36b760b5b.png](https://www.simtropolis.com/objects/attachments/monthly_2021_03/Icon_r1_res.png.f4932ca4dc9750534d5ffaf36b760b5b.png)

