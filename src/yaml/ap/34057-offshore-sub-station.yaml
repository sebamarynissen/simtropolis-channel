info:
  summary: A_1P Offshore Sub Station
  description: |-
    This is an offshore substation (OSS) as it is used in offshore windfarms to pool the energy from the wind turbine arrays and transform it to a higher voltage level to then transmit it ashore through the export cables. The hoses leading into the water on the Jacket are the so-called J-tubes that feed in the subsea cables.

    ![OFW_BUtendiek_OffshoreSubstation-1024x76](https://www.owp-butendiek.de/wp-content/uploads/2015/06/OFW_BUtendiek_OffshoreSubstation-1024x768.jpg)

    source:  OWP Butendiek (17.01.2021) [https://www.owp-butendiek.de/technology/substation/](https://www.owp-butendiek.de/technology/substation/)

    Below is some inspiration how to use it:

    ![OSS-Preview-1-soft.png](https://i.postimg.cc/FHdwkCLv/OSS-Preview-1-soft.png)
