    **Mooring Dolphins**

    Mooring Dolphins, of one sort or another, have been in use for well over 300 years. In fact, their use dates so far back in antiquity, the instance of their first use is unknown. Some of us are familiar with them mostly from old movies on television, or from old photographs pre-dating the movies, or even paintings by the “Old Masters” that go back even farther. And some among us are lucky enough to have seen them in ports such as Long Beach, New Orleans, Charleston, Norfolk, London, Wilhelmshaven, and even along the inland rivers of Germany. They are found everywhere ships are berthed, and for so simple a device, they perform invaluable service. The Dolphin’s primary function is to provide a mooring, or berth, for ships. In busy or crowded harbours, where dock space may be limited, the Dolphins are often used as a temporary “parking space” for a freighter waiting her turn to get alongside a cargo dock. In naval bases, Dolphins are usually used as permanent berths for warships, allowing the docking space to be kept open for other business. (Since the mid-1960’s, modern Dolphins are often constructed out of concrete and steel.)  
    “Dolphins” are most often a group of pilings (long, thick timbers) driven into the seabed or riverbed - sometimes gathered together at the top to create support for a small platform. The platform is provided as a working space for the mooring detail, where seamen or sailors can stand while securing heavy hawsers from a ship. The Dolphins might be a simple structure of four or five upright pilings, or they might be a more complicated structure. In the case of “AP’s” detailed Dolphins, they are meant to be a long-term, semi-permanent structure of some strength -- to berth heavy warships. “AP” has provided a simple “single” Dolphin which can be used to moor any ships you choose, in both “ortho” and “diagonal” modes. He has also provided a meticulously detailed example of a “Double Dolphin” which we have chosen as the mooring for the heaviest battleships. This is also provided in “ortho” and “diagonal” mode.

    ![image.png.797452def8965adc42328afbcd8d8321.png](https://www.simtropolis.com/objects/attachments/monthly_2024_12/image.png.797452def8965adc42328afbcd8d8321.png)

    **How to use**

    This pack contains .SC4model-files and props as .SC4desc-files. So, by installing this pack nothing will directly appear in your game. You can use the props on your own lots or convert the SC4models into buildings, as you please. Since most props are to be used on water lots and props naturally align with the surface level, they will sink to the sea floor, if you do not stick to the guidelines on how to use [props on water lots](https://community.simtropolis.com/omnibus/simcity-4/bat-lot-editor-tutorials/tutorial-for-props-on-water-r852/). Finally you will need to follow the [instructions on how to make a lot transparent](https://community.simtropolis.com/forums/topic/37597-sc4dot-sign-shop/?do=findComment&comment=1030546). You will find the props in any Lot-Editor under the prefix **A\_1P\_h\_**

    **As per request from the community, I have also included a version of the ship without historic flags and crew.**

    **Please visit [@Dreadnought](https://community.simtropolis.com/profile/683435-dreadnought/)'s CJ to get detailed descriptions and the historical backgrounds to these prop packs. You will see a wonderful display of the results of our long collaboration there and can get a preview of what might be hidden in the coming prop packs or simply get some inspiration for your own harbour!**

