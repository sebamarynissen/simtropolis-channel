  summary: A_1P Racing Fences
  description: |-
    ## Description

    This pack contains several fence pieces used around racing tracks. The fence is made up of a low concrete wall with protective fencing on top of it with old tires stacked in front.

    ## Content

    This file contains two .dat-files including multiple props. There are no lots and no content will appear in your game by just installing this pack.

    ## A\_1P\_racing\_fence\_1.2.dat

    §  curve inner

    §  curve outer

    §  diagonal long

    §  diagonal short

    §  diagonal curve inner

    §  diagonal curve inner2

    §  diagonal curve outer

    §  diagonal curve outer2

    §  diagonal long - Pirelli

    §  diagonal long - Michelin

    §  straight end

    §  straight end2

    §  straight long

    §  straight short

    §  straight short - gate

    §  straight long - Rolex

    §  straight long - GulfAir

    ## A\_1P\_racing\_fence\_additional\_curves\_1.3.dat

    §  curve inner large

    §  curve outer large

    §  diagonal curve inner long

    §  diagonal curve inner2 long

    §  diagonal curve outer long

    §  diagonal curve outer2 long

    ## Dependencies

    ·         none, this is a prop pack and will serve as a dependency itself

    ## Instructions

    Unzip and place in plugin folder, eg.:

    C:/Users//Documents/SimCity 4/Plugins
