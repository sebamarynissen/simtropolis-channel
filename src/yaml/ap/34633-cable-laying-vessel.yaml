info:
  summary: A_1P Cable Laying Vessel
  description: |-
    ## Description

    This is a cable laying vessel (CLV) used to install subsea cables to build power or telecommunication connections crossing the sea. Additionally it is used to lay the inter array cables between wind turbines in offshore windfarms or to lay export cables from offshore substations to the landfall. On deck is a giant cable carousel mounted that can store kilometres of cable. The cable is then veered out through the cable guides on the stern and slowly lowered to the seabed while its tension and direction is constantly monitored. Afterwards it usually gets buried with a jetting tool or protected by rocks placed around that cable.

    ## Content

    This File contains 3 models of the CLV and 3 lots, install which ever you like (all of them are also possible):

    ![image.png.a767fd54f8e90c30dd325767678d9e55.png](https://www.simtropolis.com/objects/attachments/monthly_2021_08/image.png.a767fd54f8e90c30dd325767678d9e55.png)

    ## A\_1P\_CLV\_in port

    Yokohama fenders on both sides

    Cable carousel empty and under maintenance

    ![image.png.df102d95cb7d8d7515bc8c258d3b53fa.png](https://www.simtropolis.com/objects/attachments/monthly_2021_08/image.png.df102d95cb7d8d7515bc8c258d3b53fa.png)

    ## A\_1P\_CLV\_under way

    Cable carousel loaded

    Model slightly rotated

    ![image.png.b502409ed3ee4cfd10e2465d0f995639.png](https://www.simtropolis.com/objects/attachments/monthly_2021_08/image.png.b502409ed3ee4cfd10e2465d0f995639.png)

    ## A\_1P\_CLV\_laying subsea cable

    ·         Cable being laid out through center hawse

    ·         Crew working on deck

    ## Dependencies

    ·         none

    ## Instructions

    Unzip and place in plugin folder, eg.:

    C:/Users//Documents/SimCity 4/Plugins


    ****Details and Comments****

    This section is addressed to people with nautical and technical interest and holds no important information about the usage or functionality of the pack.

    **Lighting and Signals**

    The working light on the deck is on for all of the versions while it is dimmed for the under-way model. The underway model additionally has the top port- and starboard navigation lights on while the laying model has these light turned off and instead red-white-red light up in the mast top and the day signal ball-rhombus-ball at-hoist, indicating limited manoeuvrability.
