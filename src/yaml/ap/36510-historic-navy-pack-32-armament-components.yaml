    **Armaments Pack**

    If you have battleships and battlecruisers, what else will you find? GUNS-! Guns, guns, and more guns. Any time a capital ship is ordered, the first order they place after signing the contract is for the guns and armor plate. The reason for this is simple. The various parts of the big rifles must be cast, bored, machined, and assembled - then test fired - before they can be delivered for installation aboard the ship. This is, to say the least, a very long and laborious process. Up to two years may be required to manufacture the guns and several thousand tons of face-hardened armor plate. Each warship generally requires between eight and ten main battery gun tubes - plus - a complete set of spare gun tubes. The ship’s main battery is installed during the “fitting-out” process, while the spare guns are (usually) specifically marked for the ship they were made for, and then stored in a central facility until needed. This ensured that all the guns were, more or less, made at the same time, through the same process, with the same materials - theoretically resulting in uniform performance characteristics. Big guns, though massive, were not as “permanent” as they might look. The average “life” of a gun tube varied according to “who” made it, and “how” it was manufactured and assembled - but was usually between one hundred to three hundred rounds. The gun barrel “life” was determined on the manufacturer’s test ranges by repeated firing of a single tube, producing “wear” in the gun tube liner, and reducing the accuracy of the gun. When this happens on a warship, it is moved into the dockyard, where the worn barrel is replaced with one of the “spares”. Main battery guns were also remarkably susceptible to battle damage - a single enemy shell actually striking the barrel and putting the gun out of action. Guns produced by the Krupp Works in Essen, Germany, were widely acclaimed as the best in the world, closely followed by guns from the Skoda Works in Pilsen, Bohemia, in the Austro-Hungarian Empire.

    “AP” has provided us with a wide range of props for your dockyards and for your industrial centers. There are shiny new guns, old rusty tubes, and some being refurbished. There is an anti-aircraft “tub mount” - a pedestal-mounted 4.7-inch gun - and a main battery turret in various stages of “test” assembly. These can be used dockside in your naval yards or stored in facilities at naval bases. They can also be displayed in industrial zones where they are manufactured and shipped out on railroads or barges. We hope you will enjoy this new level of realism in your cities.

    ![image.png.cd8b3b0f4cc86800e46a574a89c37a7c.png](https://www.simtropolis.com/objects/attachments/monthly_2024_10/image.png.cd8b3b0f4cc86800e46a574a89c37a7c.png)

    **How to use**

    This pack contains .SC4model-files and props as .SC4desc-files. So, by installing this pack nothing will directly appear in your game. You can use the props on your own lots or convert the SC4models into buildings, as you please. Since most props are to be used on water lots and props naturally align with the surface level, they will sink to the sea floor, if you do not stick to the guidelines on how to use [props on water lots](https://community.simtropolis.com/omnibus/simcity-4/bat-lot-editor-tutorials/tutorial-for-props-on-water-r852/). Finally you will need to follow the [instructions on how to make a lot transparent](https://community.simtropolis.com/forums/topic/37597-sc4dot-sign-shop/?do=findComment&comment=1030546). You will find the props in any Lot-Editor under the prefix **A\_1P\_h\_**

    **As per request from the community, I have also included a version of the ship without historic flags and crew.**

    **Please visit [@Dreadnought](https://community.simtropolis.com/profile/683435-dreadnought/)'s CJ to get detailed descriptions and the historical backgrounds to these prop packs. You will see a wonderful display of the results of our long collaboration there and can get a preview of what might be hidden in the coming prop packs or simply get some inspiration for your own harbour!**

