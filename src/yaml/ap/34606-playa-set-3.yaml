  summary: A_1P Playa Set 3
  description: |-
    ## Description

    I took the beach content a little further and modelled some props to create lots for a nice holiday retreat in huts along the beach or piers!

    ## Content

    The file containes 4 lots and one prop file:

    ## Dependencies

    [Nams PROPS PACK Vol 1.dat](https://www.toutsimcities.com/downloads/view/1780)

    [Nams PROPS PACK Vol 2.dat](https://www.toutsimcities.com/downloads/view/1882)

    Click **télécharger** to download

    [LBT Tropical Beach Props](https://community.simtropolis.com/files/file/19050-lbt-tropical-beach-props/?tab=comments) // [LBT Mega Prop Pack vol.01](https://community.simtropolis.com/files/file/21770-lbt-mega-prop-pack-vol01/)

    [A\_1P Playa Set](https://community.simtropolis.com/files/file/34549-a_1p-playa-set/)

    ## ![icon_resort.png.c61ddfa4938f71a224e0202fc0aa2617.png](https://www.simtropolis.com/objects/attachments/monthly_2021_07/icon_resort.png.c61ddfa4938f71a224e0202fc0aa2617.png)

    ·         A\_1P\_beach\_holiday\_1

    ## Instructions

    Unzip and place in plugin folder, eg.: C:/Users//Documents/SimCity 4/Plugins

    The lots will show up towards the end of your parks menu

    ## ![icon_resort.png.c61ddfa4938f71a224e0202fc0aa2617.png](https://www.simtropolis.com/objects/attachments/monthly_2021_07/icon_resort.png.c61ddfa4938f71a224e0202fc0aa2617.png)

    ·         A\_1P\_beach\_holiday\_2

    ## Usage

    The two beach resort lots are water compatible and the pile foundations are modelled as props that sink to the seabed at the location where you plop your lot, to give the illusion of piles under the water. This means the lot should be built at an exact elevation of 247m (3m below sea level). The NAM digging tools are very helpful to achieve this.

    For more details check my [tutorial](https://community.simtropolis.com/omnibus/simcity-4/bat-lot-editor-tutorials/tutorial-for-props-on-water-r852/) about floating props.

    ## ![icon_resort2.png.ce27615dadb90b7ba36c22d98704a4aa.png](https://www.simtropolis.com/objects/attachments/monthly_2021_07/icon_resort2.png.ce27615dadb90b7ba36c22d98704a4aa.png)

