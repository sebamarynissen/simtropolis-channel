    ## Description

    I went through the effort to re-lot some of the great beach props we have for the game! None of the BATs are modelled by me, so the credit goes to the creators of all the dependencies I will list below!

    ![image.png.d98d8643d723dea0657b241d7bc66e0d.png](https://www.simtropolis.com/objects/attachments/monthly_2021_06/image.png.d98d8643d723dea0657b241d7bc66e0d.png)

