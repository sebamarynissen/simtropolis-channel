info:
  summary: A_1P SAR Cruiser (28m-class, DGzRS)
  description: |-
    This is the model of a SAR Cruiser of the [28m class](https://www.seenotretter.de/wer-wir-sind/flotte/flottenuebersicht/) as operated by the German rescue organization [DGzRS](https://www.seenotretter.de/aktuelles/).

    It is a remarkably seaworthy vessel with a full aluminum hull designed in a net structure. It is powered by two MTU diesel engines with a combined power of 2.880kW, which allow speeds up to 24kts. It is designed and equipped to provide help in the most extreme weather conditions. It even has the capability of self-rightening in case of capsizing.

    Their Motto: “[Rausfahren, wenn andere reinkommen.](https://www.seenotretter.de/wer-wir-sind/kurzportrait/)”. (We go out, when others come in)

    ## Content

    There are 4 lot files in this pack, install whichever you like (it is possible to use all 4 files at the same time). The lots should show up relatively at the end of your port menu.

    ![SAR_icon_v0.png.37633429eced2c64a4e72508cb2fb852.png](https://www.simtropolis.com/objects/attachments/monthly_2021_04/SAR_icon_v0.png.37633429eced2c64a4e72508cb2fb852.png)

    A\_1P\_SAR\_cruiser1

    ·         docked (working lights on, bridge lights on, navigation lights off, personnel on deck, fenders overboard).

    ![SAR_icon_v1.png.c7a385d10aefb577b7e26bbb17a9eb2b.png](https://www.simtropolis.com/objects/attachments/monthly_2021_04/SAR_icon_v1.png.c7a385d10aefb577b7e26bbb17a9eb2b.png)

    A\_1P\_SAR\_cruiser2

    ·         underway (working and bridge lights dim, navigation lights on, personnel on bow)

    ![SAR_icon_v2.png.4f1aa5c5bd5929d39dbbbf61c5fa1766.png](https://www.simtropolis.com/objects/attachments/monthly_2021_04/SAR_icon_v2.png.4f1aa5c5bd5929d39dbbbf61c5fa1766.png)

    A\_1P\_SAR\_cruiser3

    ·         hard to stbd

    ![SAR_icon_v3.png.e079a0f0dea4244f46648305e8af1b6e.png](https://www.simtropolis.com/objects/attachments/monthly_2021_04/SAR_icon_v3.png.e079a0f0dea4244f46648305e8af1b6e.png)

    A\_1P\_SAR\_cruiser4

    ·         hard to port

    ## Dependencies

    ·         none

    ## Instructions

    Unzip and place in plugin folder, eg.:

    C:/Users//Documents/SimCity 4/Plugins

    ## Dedication

    This model is dedicated to the brave crews serving on DGzRS vessels to save others.

    ![Picture1.png.44b500ed7d26445b03594de2cd818daf.png](https://www.simtropolis.com/objects/attachments/monthly_2021_04/Picture1.png.44b500ed7d26445b03594de2cd818daf.png)
