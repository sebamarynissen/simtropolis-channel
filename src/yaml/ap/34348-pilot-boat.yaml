info:
  summary: A_1P Pilot Boat
  description: |-
    This is the model of a standard pilot boat as operated in wide regions around the world.

    Pilot boats are used to transfer pilots out to larger vessels when entering or leaving any port or close quarter maneuvering area (Revierfahrt) like river estuaries, locks and canals. The pilot takes over (or assists) the captain in maneuvering the ship while in such areas. The local pilot has knowledge about the currents, tides obstacles and other pitfalls that the crew may face while docking or departing.

    ## Content

    There are 3 lot files in this pack, install whichever you like (it is possible to use all 4 files at the same time).

    ![Icon_pilot_v1.png.868fe20a4d9fdf02b4723c8f35911540.png](https://www.simtropolis.com/objects/attachments/monthly_2021_04/Icon_pilot_v1.png.868fe20a4d9fdf02b4723c8f35911540.png)

    ·         A\_1P\_Pilot\_boat1

    Pilot boat - underway (working and bridge lights dim, navigation lights on, personnel on bow)

    ![Icon_pilot_v2.png.fa664cc7044744564565e5bd34b5b328.png](https://www.simtropolis.com/objects/attachments/monthly_2021_04/Icon_pilot_v2.png.fa664cc7044744564565e5bd34b5b328.png)

    ·         A\_1P\_Pilot\_boat2

    Pilot boat - docked (working lights on, bridge lights on, navigation lights off, personnel on deck, fenders overboard)

    ![Icon_pilot_v3.png.84cc72b4038559d2b571c7fc8dd2f479.png](https://www.simtropolis.com/objects/attachments/monthly_2021_04/Icon_pilot_v3.png.84cc72b4038559d2b571c7fc8dd2f479.png)

    ·         A\_1P\_Pilot\_boat3

    Pilot boat - hard-to-port (working and bridge lights dim, navigation lights on)

    ·

    ## Dependencies

    ·         none

    ## Instructions

    Unzip and place in plugin folder, eg.:

    C:/Users//Documents/SimCity 4/Plugins

