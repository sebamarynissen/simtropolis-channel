    **Provisions Pack**

    In the days of Nelson’s ships-of-the-line, provisions and ship’s stores were crammed into every nook and cranny of the big three-deckers. The old sailing battleships might well be at sea for months on end and a crew of up to 900 men had to be fed and provided with water, beer, and rum. Unfortunately for the sailors, victualling a warship in those days was a truly primitive business. As far as food, almost everything was packed into wooden barrels and the lids sealed with tar. Pork and beef were salted and cured. The fresh water and spirits were simply sealed in barrels. And since baking bread was too hazardous on wooden sailing ships, a flour-based cracker was substituted - appropriately referred to as “Hardtack”. Eventually, improperly seasoned wooden barrels would open at the seams, the contents would begin to spoil, and the already bad food got even worse. Fresh vegetables, however, were never available for more than a week or two once the vessel had sailed, so lime juice was shipped to help prevent scurvy and other diseases caused by vitamin deficiency. Circumstances were much improved by the early 20th Century and dreadnought warships equipped with refrigeration systems made frequent port calls to replenish fresh food supplies.

    “AP” has provided us with a prop pack of finely detailed and textured provisions to be loaded aboard your ships from the docks. They come in a variety of cases, boxes, and crates in a wide range of colours that could represent apples, potatoes, beans, cheese, boxed meats, etc, etc. And he has thoughtfully provided a selection of sailors to help move them around. These could also be used around trucking terminals, for truck deliveries to supermarkets, or to unload from trains into your warehouses.

    ![overview.png.9357f2fd1dafb508a4c3b7de7a9](https://www.simtropolis.com/objects/screens/monthly_2024_08/overview.png.9357f2fd1dafb508a4c3b7de7a90e952.png)

    **How to use**

    This pack contains .SC4model-files and props as .SC4desc-files. So, by installing this pack nothing will directly appear in your game. You can use the props on your own lots or convert the SC4models into buildings, as you please. Since most props are to be used on water lots and props naturally align with the surface level, they will sink to the sea floor, if you do not stick to the guidelines on how to use [props on water lots](https://community.simtropolis.com/omnibus/simcity-4/bat-lot-editor-tutorials/tutorial-for-props-on-water-r852/). Finally you will need to follow the [instructions on how to make a lot transparent](https://community.simtropolis.com/forums/topic/37597-sc4dot-sign-shop/?do=findComment&comment=1030546). You will find the props in any Lot-Editor under the prefix **A\_1P\_h\_**

    **As per request from the community, I have also included a version of the ship without historic flags and crew.**

    **Please visit [@Dreadnought](https://community.simtropolis.com/profile/683435-dreadnought/)'s CJ to get detailed descriptions and the historical backgrounds to these prop packs. You will see a wonderful display of the results of our long collaboration there and can get a preview of what might be hidden in the coming prop packs or simply get some inspiration for your own harbour!**

    [https://community.simtropolis.com/journals/journal/6006-imperial-dockyards-cuxhaven/?do=embed](https://community.simtropolis.com/journals/journal/6006-imperial-dockyards-cuxhaven/?do=embed)
