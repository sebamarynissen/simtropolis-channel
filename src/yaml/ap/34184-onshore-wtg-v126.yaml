info:
  summary: A_1P Onshore WTG V126
  description: |-
    This is the model of a 3.45 MW onshore wind turbine based on a Vestas V126©. It has a rotor diameter of 126m and at a hub height of 117m (for these specific models I made). It comes in tower heights up to 149m.

    Vestas is one of the biggest manufacturers of wind turbines worldwide and has been in the wind industry for over 30 years. This specific turbine is designed for IEC wind class II with high turbulence intensity and makes a typical onshore turbine. It is very reliable and efficient - one of my favourite turbines. More info can be found [here](https://www.vestas.com/en/products/4-mw-platform/v126-3_3_mw#!about).

    **Content**  
    This File contains four wind power plant lots with the same turbine type at different rotor positions.  
    The production is set to 3450 and the O&M costs are 140$ per month. One turbine is undergoing a rotor blade inspection and has no power output and zero budget impact.

