  summary: A_1P Racing Grand Stands (open)
  description: |-
    ## Description

    This pack contains 8 different sections to build open grad stands around racing tracks.

    ## Content

    This file contains two .dat-files with props. There are no lots and no content will appear in your game by just installing this pack.

    ## A\_1P\_Racing\_GrandStands  
    \_open.dat

    ## A\_1P\_Racing\_GrandStands  
    \_open\_diag.dat

    §  A\_1P\_racing\_GrandStands\_open\_center

    §  A\_1P\_racing\_GrandStands\_open\_center2

    §  A\_1P\_racing\_GrandStands\_open\_L

    §  A\_1P\_racing\_GrandStands\_open\_R

    §  A\_1P\_racing\_GrandStands\_open\_center\_45

    §  A\_1P\_racing\_GrandStands\_open\_center2\_45

    §  A\_1P\_racing\_GrandStands\_open\_L\_45

    §  A\_1P\_racing\_GrandStands\_open\_R\_45

    ## Dependencies

    None, this is a prop pack and will serve as a dependency itself

    ## Instructions

    Unzip and place in plugin folder, eg.:

    C:/Users//Documents/SimCity 4/Plugins
