info:
  summary: A_1P Offshore Wind Turbine GE Haliade-X
  description: |-
    ![image.png.9c47820dadfbdb41aff81b6f9230b462.png](https://www.simtropolis.com/objects/attachments/monthly_2021_06/image.png.9c47820dadfbdb41aff81b6f9230b462.png)

    This is the model of a 14 MW offshore wind turbine based on a General Electric (GE) Haliade-X©. It has a rotor diameter of 220 m and at a hub height of 153m (for these specific models I made). It is built on a monopile foundation for shallow coastal regions.

    The difference of this turbine compared to my other models is that it is a direct drive system. This means there is no gearbox transmitting the rotation to common generator rpms (1500rpm). Instead, there is a large diameter, multi pole, variable rpm generator that is driven directly by the rotor (7-15rpm). The converters and transformers are located in the nacelle. More info can be found [here](https://www.ge.com/renewableenergy/wind-energy/offshore-wind/haliade-x-offshore-turbine).

    ![credit-122795.jpg](https://images.oedigital.com/images/maritime/w600/credit-122795.jpg)

    ## ![image.png.96793a4547a76fc2f9c3485aa163e9f7.png](https://www.simtropolis.com/objects/attachments/monthly_2021_06/image.png.96793a4547a76fc2f9c3485aa163e9f7.png)

    ![image.png.ee21ee09222065d147cb809a95ac69c0.png](https://www.simtropolis.com/objects/attachments/monthly_2021_06/image.png.ee21ee09222065d147cb809a95ac69c0.png)

    ## Content

    This File contains four wind power plant lots with the same turbine type at different rotor positions.

    The production is set to 14,000 and the O&M costs are 500$ per month. One turbine is undergoing maintenance and has no power output and zero budget impact.

    ![image.png.1d7124cceaf521b8f9009e204201637b.png](https://www.simtropolis.com/objects/attachments/monthly_2021_06/image.png.1d7124cceaf521b8f9009e204201637b.png)

