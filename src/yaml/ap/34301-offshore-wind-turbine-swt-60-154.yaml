info:
  summary: A_1P Offshore Wind Turbine SWT-6.0-154
  description: |-
    This is the model of a 6 MW offshore wind turbine based on a Siemens SWT-6.0-154©. It has a rotor diameter of 154m and at a hub height of 120m (for these specific models I made). It is built on a 3 legged jacket for shallow coastal regions.

    The difference of this turbine compared to my other models is that it is a direct drive system. This means there is no gearbox transmitting the rotation to common generator rpms (1500rpm). Instead, there is a large diameter, multi pole, variable rpm generator that is driven directly by the rotor (7-15rpm). The converters and transformers are located in the nacelle. More info can be found [here](https://www.siemensgamesa.com/products-and-services/offshore/wind-turbine-swt-6-0-154).

    ## Content

    This File contains four wind power plant lots with the same turbine type at different rotor positions.

    The production is set to 6000 and the O&M costs are 200$ per month. One turbine is undergoing maintenance and has no power output and zero budget impact.

