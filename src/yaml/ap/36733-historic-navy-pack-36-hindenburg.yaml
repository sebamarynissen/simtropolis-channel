  description: |-
    ![banner_Vol36.png.3d447d8cde7658efe625700](https://www.simtropolis.com/objects/screens/monthly_2025_02/banner_Vol36.png.3d447d8cde7658efe625700ced102b4a.png)

    **SMS HINDENBURG -- Derfflinger Class** **Battlecruiser** **(*Panzerkreuze*r)**

    **Commissioned 1917**

    **26,947 tons - 212.8m (698 ft) length - 29m (95 ft) beam - 9.6m (31 ft) draft - 27 knots - complement: 44 officers and 1,068 men - 8x 30.5cm (12-in) guns - 14x 15cm (5,9-in) guns - 4x 8.8cm (3.5-in) guns - 4x 60cm (24-in) torpedo tubes - belt armour 30cm (11.8 in)**

    *The SMS Hindenburg* was named after Field Marshall Paul von Hindenburg, the victor of the Battle of Tannenburg and the Battle of the Masurian Lakes, and the last chief of the Imperial General Staff. *Hindenburg* was also the last warship of any type built for the Kaiserliche Marine. She was planned as the third ship of the famous *Defflinger Class* battlecruisers, but was built to a slightly modified design. She was approximately the same displacement, with nearly identical dimensions, but her main battery turrets were modified to give her 12-inch guns greater range. *Hindenburg* was unique among the battlecruisers in having been designed and built with her tripod mast. Constructed by the Kaiser Werft, Wihelmnshaven, she was commissioned late in the war and her service career was short, and though she participated in a handful of offensive operations, it was uneventful. In November 1918, after the Armistice was signed, she was interned with the Hochseeflotte at Scapa Flow pending final disposition when the Treaty of Versailles was signed. On 21 June 1919, in an act of defiance, rather than surrender his ships to their former enemies, Konteradmiral Ludwig von Reuter ordered the fleet to be scuttled. *SMS Hindenburg* was the last warship to settle to the bottom of Scapa Flow. She was eventually raised in 1930 and broken up between 1931-1932.  (For details, see [IMPERIAL DOCKYARDS: CUXHAVEN -- Chapter 41](https://community.simtropolis.com/journals/entry/30608-chapter-41-the-third-sister/).)

    ![image.png.c97eeb59cb3501d3acc58fcf21f85558.png](https://www.simtropolis.com/objects/attachments/monthly_2025_02/image.png.c97eeb59cb3501d3acc58fcf21f85558.png)

    ![image.png.3302f480b45fc64b6f9fb234a2a03458.png](https://www.simtropolis.com/objects/attachments/monthly_2025_02/image.png.3302f480b45fc64b6f9fb234a2a03458.png)

    **How to use**

    This pack contains .SC4model-files and props as .SC4desc-files. So, by installing this pack nothing will directly appear in your game. You can use the props on your own lots or convert the SC4models into buildings, as you please. Since most props are to be used on water lots and props naturally align with the surface level, they will sink to the sea floor, if you do not stick to the guidelines on how to use [props on water lots](https://community.simtropolis.com/omnibus/simcity-4/bat-lot-editor-tutorials/tutorial-for-props-on-water-r852/). Finally you will need to follow the [instructions on how to make a lot transparent](https://community.simtropolis.com/forums/topic/37597-sc4dot-sign-shop/?do=findComment&comment=1030546). You will find the props in any Lot-Editor under the prefix **A\_1P\_h\_**

    **As per request from the community, I have also included a version of the ship without historic flags and crew.**

    **Please visit [@Dreadnought](https://community.simtropolis.com/profile/683435-dreadnought/)'s CJ to get detailed descriptions and the historical backgrounds to these prop packs. You will see a wonderful display of the results of our long collaboration there and can get a preview of what might be hidden in the coming prop packs or simply get some inspiration for your own harbour!**
