info:
  summary: A_1P Wind Industry Component Logistics 2
  description: |-
    This prop pack contains content for the land-based logistics of on- and offshore wind turbines. It focusses on tip repair of the leading edge of damaged blades.

    Even though modern wind turbines rotate at lower revolutions (12~15 rpm) the blade tips reach quite fast velocities due to the massive rotor diameters. Any small particle in the air like dust, fog or rain drops causes erosion to the blade tips. This constant fatigue or a more severe incident like a lightning strike can lead to damages that need repair.

    I modeled some repair scenes of blades that have been taken down and are sanded down for repair on the ground.

    ## Content

    This File contains the following 6 props:

    A\_1P\_Blade\_repair

    A\_1P\_Blade\_repair\_worker

    A\_1P\_Blade\_scaffolding

    A\_1P\_Blade\_storage

    A\_1P\_Blade\_store\_clamp

    A\_1P\_Blade\_store\_clamp\_2

    ## Dependencies

    none

    ## Instructions

    This is a prop file! The content must be placed on your lot using a lot-editor!

    Unzip and place in (work-) plugin folder, place in plugin folder once used in a lot file, eg.:

    C:/Users//Documents/SimCity 4/Plugins
