info:
  summary: A_1P Construction Barge
  description: |-
    ## Description

    This is a near shore construction barge used for piling and dredging works in shallow coastal regions and port basins. It is a hull that is not self-propelled but equipped with 4 jack-up legs that allow to lift the barge out of the water and create a stable working platform for any equipment on deck.

    Piling tools or excavators can be brought on to dredge harbor basins or mount piles for quay structures.

    ![Screen_Shot_2015-12-10_at_14.13.13_e0e5a](https://www.abcomarine.co.uk/media/zoo/images/Screen_Shot_2015-12-10_at_14.13.13_e0e5a8b943c385598340b3276a22edbb.png)

    ## Content

    This File contains 2 models and 2 lots with different barges:

    ![image.png.501a218922f5616e7f04ca3fbd97276b.png](https://www.simtropolis.com/objects/attachments/monthly_2021_09/image.png.501a218922f5616e7f04ca3fbd97276b.png)

    A\_1P\_JackUp-Barge

    ## ·         Barge lifted above water line with piling machine and workers on deck

    ![image.png.b6489c6200cb9370638797468bf61e3c.png](https://www.simtropolis.com/objects/attachments/monthly_2021_09/image.png.b6489c6200cb9370638797468bf61e3c.png)

    A\_1P\_JackUp-Barge\_stand-by

    ## ·         **Floating barge with legs jacked-up and empty deck, fenders overboard**

    ## Dependencies

    ·         none

    ## Instructions

    Unzip and place in plugin folder, eg.:

    C:/Users//Documents/SimCity 4/Plugins
