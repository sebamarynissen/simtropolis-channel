  summary: A_1P Racing Pit Walls
  description: |-
    ## Description

    This pack contains 4 pit wall elements. They have a small outlook tower, safety equipment, lap counters and racing coordination boxes. (McLaren, ESPN, Mercedes, Haas, Alpha Tauri, Alpine, Alfa Romeo, Aston Martin, Williams, Ferrari, Sky, Red Bull)

    ## Content

    This file contains one .dat-file including 4 props. There are no lots and no content will appear in your game by just installing this pack.

    ## A\_1P\_racing\_pit\_walls.dat

    §  A\_1P\_racing\_pit\_wall\_1

    §  A\_1P\_racing\_pit\_wall\_2

    §  A\_1P\_racing\_pit\_wall\_end\_R

    §  A\_1P\_racing\_pit\_wall\_end\_L

    ## Dependencies

    ·         none, this is a prop pack and will serve as a dependency itself

    ## Instructions

    Unzip and place in plugin folder, eg.:

    C:/Users//Documents/SimCity 4/Plugins
