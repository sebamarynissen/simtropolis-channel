  summary: A_1P Racing Pit Stops
  description: |-
    ## Description

    This pack contains 3 different pit stop garage blocks and position markings for the pit lane.

    ## Content

    This file contains one .dat-file including 4 props. There are no lots and no content will appear in your game by just installing this pack.

    ## A\_1P\_racing\_pit\_stops.dat

    §  A\_1P\_racing\_pit\_stop\_1

    §  A\_1P\_racing\_pit\_stop\_2

    §  A\_1P\_racing\_pit\_stop\_3

    §  A\_1P\_racing\_pit\_stop\_positions

    ## Dependencies

    ·         none, this is a prop pack and will serve as a dependency itself

    ## Instructions

    Unzip and place in plugin folder, eg.:

    C:/Users//Documents/SimCity 4/Plugins
