info:
  summary: A_1P Onshore WTG V80
  description: |-
    This is the model of a 2 MW onshore wind turbine based on a Vestas V80©. It has a rotor diameter of 80m and at a hub height of 90m (for these specific models I made). The V80 has now been replaced by the V90 in the 2MW platform of Vestas’ fleet, but I decided to create this model, since it is so widely distributed.

    Vestas is one of the biggest manufacturers of wind turbines worldwide and has been in the wind industry for over 30 years. More info about this model can be found [here](https://www.wind-turbine-models.com/turbines/19-vestas-v80-2.0) and more info about the 2MW platform [here](http://nozebra.ipapercms.dk/Vestas/Communication/Productbrochure/2MWbrochure/2MWProductBrochure/).

    ![v80-1-1458300267.jpg](https://en.wind-turbine.com/cms/image/2/0/600/2/0/media/markt/v80-1-1458300267.jpg)

    ## Content

    This File contains four wind power plant lots with the same turbine type at different rotor positions.

    The production is set to 2000 and the O&M costs are 90$ per month. Therefore, it is slightly less cost efficient than the newer V126 I published. One turbine is undergoing maintenance and has no power output and zero budget impact.

    ![Icon_r1_res.png.a6e6cf2efbd668db96538254446b192d.png](https://www.simtropolis.com/objects/attachments/monthly_2021_03/Icon_r1_res.png.a6e6cf2efbd668db96538254446b192d.png)

