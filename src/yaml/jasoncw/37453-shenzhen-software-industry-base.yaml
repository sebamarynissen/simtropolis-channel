info:
  summary: Shenzhen Software Industry Base
  description: |-
    This is a mostly accurate recreation of an office complex in the Nanshan District of Shenzhen, China. The real building is a complex of three towers connected together at the lower levels, and has a perforated metal facade. My version is modified to only include one of the towers, the facade is not perforated, and there are a few other small changes.

    -   4x3 growable CO§§§ for the Euro tileset.
    -   MaxisNite and DarkNite versions included. DarkNite requires the [Day and Nite Modd](https://community.simtropolis.com/files/file/23089-simfox-day-and-nite-modd/).
  author: Jasoncw
  website: https://community.simtropolis.com/files/file/37453-shenzhen-software-industry-base/
