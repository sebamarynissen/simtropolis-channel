info:
  summary: Gage Building
  description: |-
    This is one of the Gage Group Buildings built in the 1890s in Chicago, USA. It was designed by Holabird & Roche.

    -   1x3 growable CO§§ for the Chicago 1890 tileset.
    -   MaxisNite and DarkNite versions included. DarkNite requires the [Day and Nite Modd](https://community.simtropolis.com/files/file/23089-simfox-day-and-nite-modd/).
    -   "Metadata.yaml" is included for use by [sc4pac](https://community.simtropolis.com/files/file/36700-sc4pac-mod-manager/), and does not need to go into your plugins folder.
  author: Jasoncw
  website: https://community.simtropolis.com/files/file/37501-gage-building/
