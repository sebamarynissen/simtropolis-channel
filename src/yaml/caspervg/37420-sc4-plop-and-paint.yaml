info:
  summary: "A DLL plugin that adds an in-game panel for browsing lots, painting props, and building and using new prop families"
  conflicts: "Only compatible with game version 1.1.641, the Windows digital edition."
  description: |
    SC4 Plop and Paint is a SimCity 4 DLL mods that adds an in-game panel for browsing lots, painting props, and building and using new prop families.

    SC4PlopAndPaint.dll adds an in-game window called Advanced Plopping & Painting. 
    
    Press O in a loaded city to open it. The window is split into three tabs: Buildings & Lots for browsing and plopping lots, Props for painting individual props, and Families for managing and painting existing and newly self-created prop families. 
    
    See also the YouTube video below for a demo clip of painting a row of soundwalls directly on the border of a highway and some commercial growables. 
  warning: |-
    To complete the installation, you must run this executable file:

    * `SC4PlopAndPaint-0.6.1-Setup.exe`

    The installer is located in the following folder:

    * `150-mods/caspervg.sc4-plop-and-paint-dll.0.6.1.sc4pac` 
    
    Run the installer and follow the instructions provided.    

    To complete the installation, copy these files from the package subfolder into the Apps folder of your Installation folder.
