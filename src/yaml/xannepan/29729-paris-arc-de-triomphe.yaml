  summary: PARIS Arc de Triomphe
  description: |-
    CONTENTS

    This package contains a the Arc de Triomphe. It is available as a landmark in the landmark menu.

    NOTES

    There are two lots, one transit enabled with a roundabout, and a normal lot.

    The transit enabled lot is functional (but the wide lanes are only eye candy). Plop the lot, connect the avenues. Traffic will be enabled after you save, exit and reload your city.
