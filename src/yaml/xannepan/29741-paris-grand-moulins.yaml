info:
  summary: PARIS Grand Moulins
  description: |-
    The Grands Moulins de Paris is a former industrial mill in Paris, today rehabilitated and in use as university library buildings.

    CONTENTS

      

    The moulins are provided as a growable residential lot and as a library.

    INSTALLATION

      

    Unzip this file in your plugins folder or (preferably) a subfolder.

    NOTE: The sidewalk textures in the picture are from my JENXPARIS\_HD\_Sidewalk\_MOD which is not yet released. The river banks visible in the pictures are a new version of the quais de seine (retextured and expansion pack)  which is not yet released either.

