  description: |-
    \*Updated\*  
    Burg Eltz is a medieval castle nestled in the hills above the Moselle River between Koblenz and Trier, Germany. The castle is surrounded on three sides by the Elzbach River, a tributary on the north side of the Moselle. It is situated on a 70m rock spur, on an important Roman trade route between the rich farm lands and their markets. The exact date of construction of the castle is not known. The first mention is to be found in a document of Fredrick I Barbarossa of 1157; a Rudolphus de Eltze is named as a witness.
