info:
  summary: Murimk Waterfront Pack 3 - Rural Marina
  description: |-
    **Description**

    This is a set of 6 lots to make your own rural marina. They are cheap to plop and most of them are neutral, not to blow any caps.

    **List of lots**

    \* Straight 1x1

    \* Straight 2x1

    \* Outer Corner

    \* Inner Corner

    \* Canopy

    \* Boathouse

    They are designed to be plopped and be used with the PPonds by Pegasus, but as there are no water props on the lots, any ploppable water can be used (only tested with PPonds, so feedback on compatibility is appreciated).

    Each lot will randomly plop one of a number of variations in color, detail and model.

    The lots can be found in the 'Parks' menu, and do not have jobs. They have transparent textures and you should be able to plop flora props on the lot itself.

    No dependencies!

    Also available at SimPeg.
