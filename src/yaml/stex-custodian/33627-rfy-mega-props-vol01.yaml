info:
  summary: RFY Mega Props Vol. 01
  description: |-
    The **RFY Mega Props Vol. 01** is a dependency pack, which collects most of the props and models (apart from the rail viaducts) from the RFY Team, and it superseds the single prop packs made by **pLynn**.  
      
    **This is a dependency package, and it doesn't contain any ploppable or growable elements. Although it can be used for creating new lots with Maxis Lot Editor or PIM\-X.**

    Since the original workingman-productions.co.uk website is no longer up and running, the decision has been made, that these contents of **pLynn**'s will be re-hosted on the main exchanges ([LEX](https://www.sc4devotion.com/csxlex/lex_main.php "SC4D LEX") and [STEX](https://community.simtropolis.com/files/category/73-workingman-productions-wmp/ "Simtropolis Exchange - Workingman Productions (WMP)")) as legacy contents on behalf of **pLynn**. For easier access and due to a more userfriendly approach, we put together this mega prop pack which is completely replacing the previous smaller prop packs.

    It is highly recommended to use the attached cleanitol file (**RFY Mega Props Vol. 01 cleanitol.txt**) and remove all the listed contents. The best way to do it, if you use the **[BSC Cleanitol TM (v1.0)](https://www.sc4devotion.com/csxlex/lex_filedesc.php?lotGET=97)** tool. Install the application (if you don't already have), run it, browse the attached \*.cleanitol.txt file and let the program remove the listed elements.

    **Installation**: Unzip the whole bundle, or COPY the "**RFY**" folder from the \*.zip into your plugin folder. You don't need to keep the "*\_Documents*" folder. To uninstall, bulldoze any instance of this lot in your city, then remove the file(s) from your Plugins.

    *For further details, please read the provided readme AND IF you still have questions, ask [@Tyberius06](https://community.simtropolis.com/profile/660284-tyberius06/)*.

    **Credits**:
    -   pLynn, the RFY Team and the WMP team for creating the models, props and the original prop packs.
    -   David (djp) for keeping the original site alive so many years, and letting us rehosting the files on the exchanges
    -   xxdita and Tyberius06 (and the STEX Custodian) for putting together the mega packs and making the files available again.  
         
    **Support**:

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested [here](https://www.sc4devotion.com/forums/index.php?topic=18355.40) or in the [STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic). Best include a screen-shot illustrating the problem.
