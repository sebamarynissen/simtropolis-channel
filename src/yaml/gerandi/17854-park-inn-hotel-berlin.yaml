info:
  summary: Park Inn Hotel Berlin
  description: |-
    This is a BAT modeled after the park inn hotel at Berlin's Alexanderplatz.

    THe building is a part of the re-creation of the square and has been built between 1967 and 1970. With a total height of 120 meters it has been the 2nd highest building in former East Berlin. (After the Television Tower, what is included in the game already.)

    In the GDR it was the hotel, where the Ambassadors of other Warsaw-Pact-Countries slept in. It was beside of the 5stars of Berlin a 4star hotel.

    Before the Reunification it was known as "Interhotel-Berlin" and after 1991 "Forumhotel".

    In 2003 it got it final name "park inn hotel".

    In October 2006 two 35meters high antennas were put on the top of the building, what gave the building the height of 149,5 meters. With that it is the 3rd highest building in the German capital and the highest located casino in the whole of Europe.

    The LOT has a total size of 3x7 zones.

