info:
  summary: SC4 Modern Camera
  description: |-
    A DLL-based camera control plugin for SimCity 4. It replaces the original fixed camera behavior with a modern mouse-controlled camera system, including smooth zooming, camera rotation, pitch adjustment, optional WASD movement, and an in-game settings interface.

    Controls:
    - WASD: Move the camera, if enabled in-game.
    - Shift + WASD: Move the camera faster.
    - Middle Mouse Button + horizontal drag: Rotate the camera.
    - Middle Mouse Button + vertical drag: Adjust camera pitch.
    - Mouse wheel: Smooth zoom.
    - Floating camera button: Open the in-game camera settings window.

    The settings window allows players to switch between Modern and Classic camera modes in real time, reset the camera location, view the changelog, and access advanced settings for redraw behavior and diagnostic logging.

    This package contains both the required DLL plugin and its companion DAT file. The DLL is included with an explicit checksum so sc4pac can safely install it.
