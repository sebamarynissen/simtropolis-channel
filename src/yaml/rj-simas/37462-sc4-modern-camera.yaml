info:
  summary: SC4 Modern Camera
  description: |-
    **\=====     SC4-ModernCamera     =====**

    This mod ***completely changes the SimCity 4 Classic Camera into a more modern Mouse-Controlled camera.***

    **Current Controls:**

    -   WASD: Moves the camera (optional - can be disabled in-game)
        -   Hold SHIFT to move faster
    -   M3 + horizontal drag: Rotates the camera.
    -   M3 + vertical drag: Adjusts the camera pitch.
        -   In-game Option to Invert Vertical controls
    -   Mouse wheel: New ***smooth zoom experience*****.**

    ![camera_point.png.4dfb56cd8b5fcefa41d8d675de6b39b2.png](https://www.simtropolis.com/objects/attachments/monthly_2026_06/camera_point.png.4dfb56cd8b5fcefa41d8d675de6b39b2.png)

    **Camera options are available in-game a NEW Modern Camera settings button in the upper-right corner of the screen.**

    The ***settings window*** can switch between Modern and Classic camera mode in real time, reset the camera location, show the changelog, and open Advanced Settings for redraw aggression and diagnostics logging.  
      
    If you enjoy the plugin, *please leave a review!*  
      
    **Discuss the plugin on the forums:**

    [https://community.simtropolis.com/forums/topic/764328-new-modern-3d-camera-plugin/?do=embed](https://community.simtropolis.com/forums/topic/764328-new-modern-3d-camera-plugin/?do=embed)
