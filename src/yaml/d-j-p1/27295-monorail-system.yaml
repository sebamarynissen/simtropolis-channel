info:
  summary: Monorail System
  description: |-
    **WMP Monorail System** (Unfinished) by DocRorlach

    The **WMP Monorail System** was meant to provide a complete viaduct set, as well as various stations and under-rail-lots. Unfortunately, due to illness, DocRorlach never quite finished the intended set.

    As it stands now, only one viaduct filler has been completed, together with a station to fit Y-Junctions (left), and several straight stations (all 6x1), open and closed (see images below):

    1 Viaduct Filler (with road/street tunnel);

    1 Y-Junction Station;

    1 Dual-Avenue Station;

    1 Full Station (urban);

    3 Full Stations (industrial);

    1 Open Station (industrial);

    It is unlikely that the planned set will ever be completed, however, the GMax models are available upon request, and of course all lots are open to relotting by anyone who wants to have a go at it.

    **Lot Details and Information:**

    Lot sizes: 1 x 1 tiles (overhanging stations), 6x1 Urban Monorail Station

    Menu position: Rail, MonoRail

    Jobs: varied;

    Capacity: 60000-90000 passengers

    Power consumption: varied;

    Water consumption: varied;

    Pollution (stations only): Air: 5 over 5 tiles; Water: 0 over 0 tiles; Garbage: 5 over 5 tiles

    **External Dependencies**:

    -   **[Network Addon Mod (latest)](https://www.sc4devotion.com/csxlex/lex_filedesc.php?lotGET=851)**  (EL Network Props.dat) (essential)

    **Installation**: Unzip the whole bundle, or COPY the "**WMP**" folder from the \*.zip into your plugin folder. You don't need to keep the "*\_Documents*" folder. To uninstall, bulldoze any instance of this lot in your city, then remove the file(s) from your Plugins.

    *For further details, please read the provided readme AND IF you still have questions, ask [@Tyberius06](https://community.simtropolis.com/profile/660284-tyberius06/)*.

    **Credits:**
    - **DocRorlach** and the **WMP team** for creating the models, props and the original prop packs.
    - David (djp) for keeping the original site alive so many years, and letting us rehosting the files on the exchanges
    - Tyberius06 (STEX Custodian) and xxdita for the restoration/rehosting of these contents.

      
    **Support**:

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
