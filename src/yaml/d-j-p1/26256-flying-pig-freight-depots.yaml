info:
  summary: Flying Pig Freight Depots
  description: |-
    This series of old freight stops comes in both electrified and standard track versions, and was originally designed to complement the recent emergence of the SPAM (SimPeg Agricultural Mod) series of mods and lots.

    The downloads includes a series of props (including all main main buildings) for those who prefer to create their own custom lots, as well as an off-set larger version of the WMP signal box.

    **Lot Details and Information**

    **Old Freight Depot**: 6 x 4 tiles, Jobs $ : 15,Jobs $$ : 2, Plop cost: § 850, Bulldoze cost: § 355, Monthly cost: § 10, Consumption: Power: 21 MWh/month - Water: 3 Gallons/month

    **Red-Brick Warehouse , long**: 5 x 4 tiles, Jobs $ : 25,Jobs $$ : 2, Plop cost: § 660, Bulldoze cost:, § 325, Monthly cost: § 15, Consumption: Power: 26 MWh/month - Water: 4 Gallons/month

    **Red-Brick Warehouse ,short**: 5 x 3 tiles, Jobs $ : 15,Jobs $$ : 1, Plop cost: § 600, Bulldoze cost: § 250, Monthly cost: § 10, Consumption: Power: 20 MWh/month - Water: 5 Gallons/month

    Menu position (all): Building: Transportation, Building: Rail, Building: Strikable Transit, Building: Freight Rail

    Pollution (all): Air: 0 over 0 tiles; Water: 0 over 0 tiles; Garbage: 3 over 6 tiles

    **Credits**:

    Thanks to everyone around the Pegasus site & teams; Dave (djp) for repeated testing; adamos666, Marian87, Antics, DennisP, and LiftScience for the sketch-up models; Dosch for Sims models; and of course Shokthrpy for his advice on night lights.

    **Problems?**

    If you have problems with this lot it is most likely that you did not download all the dependencies or - just as likely - that we made a mistake. You can contact us via email at [comments@workingman-productions.co.uk](mailto:comments@workingman-productions.co.uk). Best include a screen-shot illustrating the problem.

    This and similar downloads are also available from the [WMP Exchange](http://workingman-productions.co.uk/downloads/shore_downloads.html)
