info:
  summary: Murimk Boardwalk
  description: |-
    **The Boardwalks**: props by **Murimk** & **DocRorlach**; lotted by **DocRorlach**

    Included are three sets of boardwalks: two are strictly texture-based and thus lie flat on the terrain (and are therefore slope-tolerant), while the main one is based on Murimk's boat pier props, making this set a total of 30 lots. Props will show up during plopping, hence there should be no problem with orienting the lots. Murimk's Boardwalk has a transparent base making it easy to paint ploppable water below it. The other boardwalks need to be painted more carefully: we suggest using 1/4 brushes. Best "water" for these lots is **[Tahoe, by Pegasus](https://community.simtropolis.com/files/file/21661-peg-ppond-kit/ "Water MMP")**, and available on the STEX.

    Lot Details and Information can be found in the readme. Read it.

    To ensure the proper functionality, make sure the files mentioned below are installed in the plugins folder.  
    *WMP Dependencies:*

    -   **[WMP Mega Props vol. 01 - Misc General Props](https://community.simtropolis.com/files/file/33621-wmp-mega-props-vol-01-misc-general-props/)** and for the **[SC4D LEX Link](https://www.sc4devotion.com/csxlex/lex_filedesc.php?lotGET=3970 "WMP Mega Props vol. 01")**
    -   **[WMP Mega Props vol. 02 - Misc Industrial Props](https://community.simtropolis.com/files/file/33622-wmp-mega-props-vol-02-misc-industrial-props/)** and for the **[SC4D LEX Link](https://www.sc4devotion.com/csxlex/lex_filedesc.php?lotGET=3971 "WMP Mega Props vol. 02")**
    -   [**WMP Essentials v1.01**](https://community.simtropolis.com/files/file/33620-wmp-essentials-v10/ "Custom UI, Building examplars") or above and for the **[SC4D LEX Link](https://www.sc4devotion.com/csxlex/lex_filedesc.php?lotGET=3975 "WMP Essentials v1.0").** It is ESSENTIAL you to have this if you want to avoid annoying BROWN BOXes.
    -   **[WMP Mega Textures v1.02](https://community.simtropolis.com/files/file/33626-wmp-mega-textures-v102/)** and for the **[SC4D LEX Link](https://www.sc4devotion.com/csxlex/lex_filedesc.php?lotGET=3976 "WMP Mega Textures v1.02")**

    *External Dependencies:*

    -   **[Murimk Waterfront Pack 3 - Rural Marina](https://community.simtropolis.com/files/file/26042-murimk-waterfront-pack-3-rural-marina/ "Murimk_Rural_Marina_Resource.dat")**
    -   **[Murimk - Props Vol02 - Mixed Props](https://community.simtropolis.com/files/file/25888-murimk-props-vol02-mixed-props/ "Murimk Props Vol02")**
    -   **[SFBT Essentials](https://www.sc4devotion.com/csxlex/lex_filedesc.php?lotGET=750 "SFBT_Party_Props.dat")**

    **Installation**: Unzip the whole bundle, or COPY the "**WMP**" folder from the \*.zip into your plugin folder. You don't need to keep the "*\_Documents*" folder.

    **To uninstall**, bulldoze any instance of this lot in your city, then remove the file(s) from your Plugins.

    *For further details, please read the provided readme AND IF you still have questions, ask [@Tyberius06](https://community.simtropolis.com/profile/660284-tyberius06/)*.

    **Credits**:

    -   *Original Creditings*: Thanks to everyone around the Pegasus site & teams; SFBT (especially Andreas); Murimk for the props, and everyone else for their ideas.
        
    -   *Additional Credits:*
        
        -   **DocRorlach** and the **WMP team** and his associates for creating the models, props and the original lots.
        -   David (djp) for keeping the original site alive so many years, and letting us rehosting the files on the exchanges
        -   Tyberius06 (STEX Custodian) and xxdita for the restoration/rehosting of these contents.

    ## Support

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
