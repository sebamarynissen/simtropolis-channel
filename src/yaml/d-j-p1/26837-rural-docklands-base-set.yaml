info:
  summary: Rural Docklands - Base Set
  description: |-
    The first base set contains thirteen 16m wide 1x2 lots, plus two 2x2 IC lots with jobs, and two 2x2 OC lots. The second, optional set of eleven optional 32m and 48m dockland piers contains several pieces with street access and jobs.

    Further to these sets there are additional optional [Warehouse Lots](http://workingman-productions.co.uk/downloads/wmp_rdock_whouses.html), a [Dockland Ferry](http://workingman-productions.co.uk/downloads/wmp_rdock_ferry.html), and a [Dockland Rail Freight Depot](http://workingman-productions.co.uk/downloads/wmp_rdock_freight.html) available separately.

    Like all dockland pieces, they contain timed props and thus use the same set of WMP dependencies. The download contains individual lots rather than a combined DAT, so you can pick and choose which to install. All pieces are self-levelling and will lower the terrain similar to other harbour lots.

    Download sizes are due to the entire project having been rendered in HD.

    **Base Set of 16m Docks:**

    Lot size: 1 x 2 tiles

    Menu position: Building: WaterTransit

    Jobs: IC pieces only (see below)

    Plop cost: § 100 ea.

    Bulldoze cost: § 60 ea.

    Monthly cost: § 10 ea.

    Power Usage: 5 MWh/month ea.

    Water Usage: 5 Gallons/month ea.

    Pollution: Water: 2 over 2 tiles; Garbage: 2 over 2 tiles

    Job Details:

    IC 1 - IM: 9

    IC 2 - IM: 12

    **Credits:**

    Thanks to everyone around the Pegasus site & teams; as always, Dave for his patience with testing this stuff; NBVC and Murimk for their GMax advice.

    Credits also go to Max Grueter for his Working Class Heroes, and the number of anonymous creators at the 3D Warehouse.

    ## Support

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
