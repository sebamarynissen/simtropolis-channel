info:
  summary: Ethanol Plant A
  description: |-
    This is the first in a series of SPAM (SimPeg Agricultural Mod) workplaces: a large ethanol plant, based roughly on a real-life plant somewhere in the United States. The large lot contains everything needed to create the bio fuel, and employs 145 folks from the surrounding rural area. The plant, while listed as a landmark, also acts as a switch between freight rail and freight trucks.

    All buildings were rendered in SD to reduce the overall file size, however, all props were exported using HD. The dependencies contain two BSC Prop Packs that, while large, are common enough that most everyone will already own them.

    An optional Left-Hand Drive patch is available (must be loaded **after** wmp\_texture10.dat).

    **Lot Details and Information**

    Lot size: 11 x 9 tiles

    Menu position: Building: IM,Building: Landmark

    Jobs: 145

    Plop cost: § 1950

    Bulldoze cost: § 965

    Monthly cost: § 45

    Power consumption: 75 MWh/month

    Water consumption: 52 Gallons/month

    Pollution: Air: 0 over 0 tiles; Water: 5 over 5 tiles; Garbage: 10 over 15 tiles
        

    **Credits**

    Special thanks have to go to the rambuctious players at SimPeg; in particular to *TownMaster* (for his in-depth lectures on how these plants work, and *Polock1* (for suggesting the idea & going out of his way to photograph a local plant);

    Thanks also go to *Rivit* for creating the custom pathing; *Dave* for his patience with testing this stuff; and *shokthrpy* for his superb parking props.

    ## Support

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
