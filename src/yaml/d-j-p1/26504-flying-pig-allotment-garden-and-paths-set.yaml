#   summary: Flying Pig Allotment Garden and Paths Set
#   description: |-
#     **WMP Allotment Garden Set**, by DocRorlach

#     The WMP Allotments Set consists of 12 community gardens, ranging from 1x2 to 2x4 in size, plus a Garden Centre Clubhouse, a Market Square, a functional Transformer Substation, and an equally functioning small Water Pumping Station. Both the power substation and the water pump are found, together with the allotments, in the park menu, and are clearly indicated by custom icons.

#     In addition, the set contains pathways: fenced for the outer pathways, and standard tiles for inner walkways. There are several street connectors, however, all other path and fence tiles are decorative lots only. Path tiles come with their own custom icons for easier identification. The wooden overpass fits over standard rail, road, or street tiles.

#     The set comes with its own range of textures and HD props, and all allotment buildings have been rendered in HD, hence the large download sizes.

#     ## Lot Details and Information

#     Lot sizes: varied; from 2x1 to 4 x 3 tiles

#     Menu position: Building: Civic,Building: Park (the power & water utilities are also found in the Park Menu)

#     Plop cost: varied

#     Bulldoze cost: varied

#     Monthly cost: varied

#     Park effect: 5 over 5 tiles per lot

#     Power consumption: varied

#     Water consumption: varied

#     Pollution: varied

#     ## Credits

#     Thanks to Tariel for mooting the original idea; C.P. for his excellent flora props; all the folks at SimPeg contributing to the proliferation of SPAM; Dave for his unerring testing; Rivit for checking the path and suggesting alternatives; and everyone for their encouragement.

#     ## Support

#     These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
