info:
  summary: The Rectangle Roundhouse (WMP Railyard)
  description: |-
    **The Rectangle Roundhouse** carries quite a few dependencies, and as such is really meant for folks who have already accumulated most of the WMP and BSC props.

    Rather than leave it as a pure landmark, the decision was made to turn the rail yard into a freight depot, with track connections for both STR & DTR as well as street access.

    Nearly all SFBT rail props are timed, as are some of the WMP cars and trucks. Its massive size is perhaps not for everyone; unfortunately there was no time to turn it into a modular set as originally planned.

    ## Lot Details and Information

    Lot size: 10 x 16 tiles

    Menu position: Building: Transportation,Building: Rail,Building: Strikeable Transit,Building: FreightRail

    Jobs: $ : 85, $$ : 14, $$$ : 2

    Plop cost: § 3650

    Bulldoze cost: § 1450

    Monthly cost: § 243

    Max. Fire Stage: 4

    Power consumption: 125 MWh/month

    Water consumption: 153 Gallons/month

    Pollution: Air: 5 over 10 tiles; Water: 2 over 10 tiles; Garbage: 10 over 10 tiles

    ## Credits

    Special thanks goes once again to *Rivit* for the special track textures, and *Dave* for his patience with testing this stuff;

    ## Support

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
