info:
  summary: Tunnel Portals
  description: |-
    **WMP Tunnel Portals by DocRorlach**

    *Note: These tunnel portals will* ***only*** *work with* ***[rivit's Tunnel Mod](https://community.simtropolis.com/files/file/26943-tunnel-modd/)****, which reduces tunnel height to 7.5m. Standard Maxis tunnel are too high.*

    Included Portals: several Road, Single-Track Rai, Double-Track Rail, Avenue, Ground Highway, 4-lane RHW portals. You will find them in the Parks Menu (the screenshots here are samples only).

    The portals are overlays, and must be placed to the right of the actual tunnel entrance, one tile away from the tunnel mouth. The tile must be level with the rail/road/avenue/highway. Coverage depends on the terrain, thus you need to experiment a bit.

    Most of the tunnels' rear portion can be partially decorated with MMPs, although some care needs to be taken not to cover the tunnel mouth.

    **NOTE: on the original Road Tunnel LOT the tunnel prop has been repositioned. It is highly recommended to bulldoze and replop this lot if you previously used.**

    **Lot Details and Information can be found in the readme. Read it.**

    *For further details, please read the provided readme AND IF you still have questions, ask [@Tyberius06](https://community.simtropolis.com/profile/660284-tyberius06/)*.

    ## Credits
    - *Original Creditings*: Thanks to everyone around the Rivit for his excellent mod which sparked this idea, and for Dave & Epic Blunder for their extensive testing.
    - Additional Credits:
        - **DocRorlach** and the **WMP team** for creating the models, props and the original lots.
        - David (djp) for keeping the original site alive so many years, and letting us rehosting the files on the exchanges
        - Tyberius06 (STEX Custodian) and xxdita for the restoration/rehosting of these contents.

    ## Support

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
