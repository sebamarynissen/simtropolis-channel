info:
  summary: SPAM Distillery
  description: |-
    This **WMP** **SPAM** **Workplace** is a spin-off from the ethanol plant. Since the basic ingredients were already in place, some managers felt it was high time to do something for the community and revive an old still.

    Now your rural towns can now produce vodka and other spirits and thereby enlighten the moods of the local populace. The small plant offers employment to seventeen spiritual experts. All props & buildings were rendered in HD.

    **Lot Details and Information:**

    Lot size: 5 x 2 tiles

    Menu position: Building: IM,Building: Landmark

    Jobs: 17

    Plop cost: $ 750

    Bulldoze cost: $ 300

    Monthly cost: $ 15

    Power consumption: 10 MWh/month

    Water consumption: 40 Gallons/month

    Pollution: Water: 5 over 8 tiles; Garbage: 5 over 8 tiles
        
    ## Support

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
