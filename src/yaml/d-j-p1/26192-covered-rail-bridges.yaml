info:
  summary: Covered Rail Bridges
  description: |-
    WMP Covered Rail Bridges, batted & lotted by DocRorlach

    These two covered bridges are meant for NAM Viaduct puzzle-pieces and can be plopped on either side of a track, provided the tile next to the track is level. They have been adapted from our earlier eye-candy set, but made higher to accommodate rail.

    Both will cover up to three straight viaduct pieces, plus the two on-slope connectors, and are meant for a bridge height of 15m.

    The bridges are found near the top of the rail menu, and have no additional dependencies.

    Lot Details and Information

    Ploppable Version:

    Lot size: 1 x 1 tiles (bridges are off-set

    Menu position: Building: Rail

    Jobs: n/a

    Plop cost: § 336

    Bulldoze cost: § 117

    Monthly cost: § 5

    Power consumption: 0 MWh/month

    Water consumption: 0 Gallons/month

    Pollution: none

    Compatibility

    This download is only compatible with SimCity 4 "Rush Hour" or SimCity 4 Deluxe.

    Installation

    Manual Installations: If you are using the DIC (Download & Installation Catalogue) manual installations are easy. If not, unpack the ZIP archive into your (My) Documents/SimCity 4/Plugins Folder. We recommend creating a WorkingMan folder beforehand if it does not exist and using that as the installation folder.

    Un-Installing: To un-install the files, simply bulldoze every lot from this download in your cities and delete the files from the plugins folder afterwards.

    Dependencies

    \* wmp\_rail\_props01.dat (included)

    Notes about Nightlighting Effects

    In order to see the nightlighting, you must install the EP1-Update 1 for Rush Hour/SimCity 4 Deluxe, and then afterwards, install the SC4-Update for nightlighting (note: you have to be logged in in order to see the download link). If this update isn't installed, you won't see any lighting effects on custom BAT buildings.

    Disclaimer

    The usage of this download is on your own risk. We do test our lots and of course use them ourselves, so they should work properly, but errors may still exist. Feel free to modify the lots for yourself and show them in your City Journals, but you cannot distribute them in any manner or form. You certainly cannot upload them to fan sites or file exchanges.

    All ZIP archives and the files they contain have been checked for virus infections and are clean.

    Credits

    Thanks to everyone around the Pegasus site & teams; especially Becca & Murimk for their help with the special LODs, and Dave for testing patiently.

    ## Support

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
