info:
  summary: Flying Pig Passenger Stations
  description: |-
    The Flying Pig Passenger Stations complement the freight depots from the same series, released in May 2011. The set contains two stations: one for double-track, and one for single track railways. Each station has a "twin" for those users which have not electrified their rail system.

    Stations and most props have been rendered in HD - hence the somewhat larger download sizes.
    - Lot sizes: 7 x 3 tiles and 5x3 tiles  
    - Menu position: Building: Transportation,Building: Rail,Building: Strikable Transit,Building: Taxi\_Maker,Building: PassengerRail  
    - Jobs: Long Station: Jobs $ : 95,Jobs $$ : 5,Jobs $$$ : 0  
    - Jobs: Short Station: Jobs $ : 35,Jobs $$ : 5,Jobs $$$ : 0  
    - Plop cost: Long Station: § 875; Short Station: § 820  
    - Bulldoze cost: Long Station: § 456; Short Station: § 412  
    - Monthly cost: Long Station: § 25; Short Station: § 24  
    - Power consumption: 61 MWh/month  
    - Water consumption: 23 Gallons/month  
    - Pollution: Air: 0 over 0 tiles; Water: 0 over 0 tiles; Garbage: 4 over 10 tiles  
    - Capacities: Long Station: 5,450; Short Station: 4,500  

    Credits: Car Models by Antics & Anonymus (3d Warehouse)

    These and other new lots & props are also available from the [WMP Exchange](http://workingman-productions.co.uk/downloads/shore_downloads.html).
