info:
  summary: Rural Docklands - Optional Set II
  description: |-
    This second, optional set of eleven optional 32m and 48m dockland piers contains several pieces with street access and jobs.

    Further to these sets there are additional optional [Warehouse Lots](http://workingman-productions.co.uk/downloads/wmp_rdock_whouses.html), a [Dockland Ferry](http://workingman-productions.co.uk/downloads/wmp_rdock_ferry.html), and a [Dockland Rail Freight Depot](http://workingman-productions.co.uk/downloads/wmp_rdock_freight.html) available separately.

    Like all dockland pieces, they contain timed props and thus use the same set of WMP dependencies. The download contains individual lots rather than a combined DAT, so you can pick and choose which to install. All pieces are self-leveling and will lower the terrain similar to other harbour lots.

    **Optional 32m & 48m docks:**

    Lot sizes: 2 x 2 tiles; 2x3 tiles, 3x3 tiles;

    Menu position: Water Transit

    Jobs: varied (see below)

    Plop cost: varied

    Bulldoze cost: varied

    Monthly cost: § 10 ea.

    Power Usage: varied

    Water Usage: varied

    Pollution: Water: 3 over 4 tiles; Garbage: 32 over 4 tiles ea.

    Job Details:

    48m Warehouse A - IM: 18

    48m Warehouse B - IM: 22

    Fertilizer Filling - IM: 8

    Crane Pier - IM: 5

    **Credits:**

    Thanks to everyone around the Pegasus site & teams; as always, Dave for his patience with testing this stuff; NBVC and Murimk for their GMax advice.

    Credits also go to Max Grueter for his Working Class Heroes, and the number of anonymous creators at the 3D Warehouse.

    **Problems?**

    If you have problems with this lot it is most likely that you did not download all the dependencies or - just as likely - that we made a mistake. You can contact us via email at [comments@workingman-productions.co.uk](mailto:comments@workingman-productions.co.uk). Best include a screen-shot illustrating the problem.
