info:
  summary: Rural Docklands 3
  description: |-
    This is the third Docklands set; this time around the docks and piers are wooden to give them a more rural flavour. There are a total of 42 lots in the set, including 4 water-based tug & barge lots, several bus stops, a freight stop, a fire station, as well as a ferry and a desalination plant, all fitted around the same theme.

    The desalination plant is located on-shore but has a companion dock lot (pumping station) to connect it to your harbour. All lots featuring a gate and a street connection offer jobs to your Sims and thus do require transit access.

    All WMP buildings and props were rendered in HD, which accounts for the file sizes.

    ## Lot Details and Information

    Lot size: varied;

    Menu position: WaterTransit (except for Desalination Plant which is found in the Water Utility menu);

    Jobs: varied;

    Plop cost: varied;

    Bulldoze cost: varied;

    Monthly cost: $ 10

    Power consumption: 20 MWh/month

    Water consumption: 10 Gallons/month

    Pollution: varied;
        
    ## Credits

    Thanks go to d\_j\_p1 for his patient testing of all WMP lots & mods, and to RTM for the excellent fire & emergency vehicles; the tug, as well as most of the crane models came from the 3D warehouse.

    ## Support

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
