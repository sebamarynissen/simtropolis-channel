info:
  summary: Central Station
  description: |-
    WMP Central Stations were built to be used with elevated and ground-level rail connections. Although one could use the station without them, NAM Viaducts are required to build track along the northern platform. Batted & Lotted by DocRorlach.

    The station comes in three "flavours": Sandstone bricks, grey concrete hexagon tiles, and blue-grey slate tiles to accommodate various neighbourhoods. The sandstone & blue slate versions are available on the [WMP Exchange](http://workingman-productions.co.uk/downloads/shore_downloads.html).

    Statistics:

    Lot size: 8 x 5 tiles

    Capacity: 4,500 passengers

    Jobs: Jobs $ : 35,Jobs $$ : 7,Jobs $$$ : 2,R-$ : 35,R-$$ : 7,R-$$$ : 2

    Plop cost: § 1375

    Bulldoze cost: § 555

    Monthly cost: § 35

    Dependencies (these downloads are also available on the STEX):

    \* [wmp\_station\_props.dat (HD props)](http://workingman-productions.co.uk/dlTracker.asp?GET=downloads/exchange/wmp_station_props.zip)

    \* [wmp\_textures02.dat](http://workingman-productions.co.uk/dlTracker.asp?GET=downloads/exchange/wmp_textures02.zip)

    \* [wmp\_bridgeprops.dat](http://workingman-productions.co.uk/dlTracker.asp?GET=downloads/exchange/WMP_Props_Textures01.zip) (only needed if you never downloaded WMP Bridges)

    \* [Network Add-on Mod (NAM)](https://www.sc4devotion.com/csxlex/lex_filedesc.php?lotGET=851) for the viaducts

    Credits:

    Dave for testing and the midnight photography; Murimk, Shkthrpy, Becca, ABCVS and everyone else for keeping me at it and helping getting the kinks out of this project; DOSH for his Sim models; antics & valentas00 for the car models at the 3D Warehouse.

    Problems?

    If you have problems with this lot it is most likely that you did not download all the dependencies or - just as likely - that we made a mistake. You can contact us via email at [Email me](mailto:comments@workingman-productions.co.uk). Best include a screen-shot illustrating the problem. We also maintain a [support forum at SimPeg.com](https://community.simtropolis.com/forums/topic/68471-plex-on-the-stex-community-support/forum/index.php?topic=9394.0)

    **NOTE: Texture fix. If you have either** [**wmp\_textures.dat**](http://workingman-productions.co.uk/dlTracker.asp?GET=downloads/exchange/wmp_textures.zip) **or** [**wmp\_textures02.dat**](http://workingman-productions.co.uk/dlTracker.asp?GET=downloads/exchange/wmp_textures02.zip) **you need to redownload these to effect the fix properly.**
