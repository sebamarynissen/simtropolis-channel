  summary: Patagonian Feed & Farm Supplies
  description: |-
    DocRorlach's *Patagonian Feed & Farm Supplies* store is the latest in the WMP SPAM Workplaces series. True to its rural settings it provides a mere twelve jobs; can be found atop the Landmarks menu; and comes on a 5x4 lot with street access.

    All props and buildings have been rendered in HD.

    **Lot Details and Information:**

    Lot size: 5 x 4 tiles

    Menu position: Landmark,Building: CS$$

    Jobs: 12 C$$

    Plop cost: § 840

    Bulldoze cost: § 525

    Monthly cost: § 15

    Power consumption: 20 MWh/month

    Water consumption: 20 Gallons/month

    Pollution: Garbage: 6 over 8 tiles

    **Problems?**

    If you have problems with this lot it is most likely that you did not download ***all*** the dependencies or - just as likely - that we made a mistake. You can contact us via email at [comments@workingman-productions.co.uk](mailto:comments@workingman-productions.co.uk). Best include a screen-shot illustrating the problem.
