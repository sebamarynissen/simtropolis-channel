  description: |-
    **Abtei Rowing Club (ARC)**

    by DocRorlach

    The Abtei Rowing Club (ARC) is meant as a companion building for the Abtei Bruecke (separate download) and has been designed in the same style, using the same materials. Having jobs and street access, it can be found in the Landmark menu. The lot contains a Bar & Buffet terrace and an oar repair shed.

    Accompanying the clubhouse are 19 ploppable water craft meant for ploppable water (they do not work with in-game water): several single and double racing sculls at different angles; inflatable rafts, an outboard motor boat, sailing dinghies, as well as some punts. Additionally, there are racing demarcation posts and a scull race finish line. The included pun dock was designed to work with **[Murimk's Rural Marinas](https://community.simtropolis.com/files/file/26042-murimk-waterfront-pack-3-rural-marina/)** (available on the STEX). To use these watercraft, plop the boats first, then "paint" the water around them. All items, except the clubhouse, can be found atop the Park Menu.

    Thanks to Paeng's efforts, all boating items are also available as MMPs (Mayor Mode Ploppables).

    As always, every item in this download has been rendered in HD.

    Lot size: Rowing Club: 5 x 3 tiles, all other items: 1x1 tile;

    Menu position: Rowing Club: Landmark Menu; Boats: Park Menu

    Jobs: Rowing Club: 232 C$, 60 C$$, 26 C$$$

    Plop cost: § 1025

    Bulldoze cost: § 625

    Max. Fire Stage: 1

    Power consumption: 7 MWh/month

    Water consumption: 32 Gallons/month

    Pollution: Air: 2 over 2 tiles; Water: 5 over 2 tiles; Garbage: 8 over 2 tiles

    *For further details, please read the provided readme AND IF you still have questions, ask [@Tyberius06](https://community.simtropolis.com/profile/660284-tyberius06/)*.

    **Disclaimer**:

    The usage of this download is on your own risk. We do test our lots and of course use them ourselves, so they should work properly, but errors may still exist. Feel free to modify the lots for yourself and show them in your City Journals, but you cannot distribute them in any manner or form. You certainly cannot upload them to fan sites or file exchanges. All ZIP archives and the files they contain have been checked for virus infections and are clean.

    **Credits**:

    -   *Original Creditings*: Thanks to Tariel & Chris for their boat suggestions; everyone else at SimPeg for their ideas & suggestions; and - as always - to Dave for pointing out the flaws and required corrections.  
        Special thanks goes to Paeng for creating the MMPs of all boating items. I would not have known where to begin. Credit for the Sim models goes to DOSH, whose people creations I messed around with. The pier sections used were made by Murimk, without who's help none of this would have been possible.
        
    -   Additional Credits:
        
        -   **DocRorlach** and the **WMP team** and his associates for creating the models, props and the original lots.
        -   David (djp) for keeping the original site alive so many years, and letting us rehosting the files on the exchanges
        -   Tyberius06 (STEX Custodian) and xxdita for the restoration/rehosting of these contents.

    **Support**:

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
