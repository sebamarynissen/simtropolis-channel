info:
  summary: Grain Freight Depot
  description: |-
    Modelled vaguely on a real grain depot, this second lot in the WMP SPAM Workplaces series, the WMP Grain Freight Depot acts as a small, rural freight station providing fifteen jobs. Being a rural depot, the freight capacity is limited at 7,500.

    Since this lot uses custom pathed Single-Track Rail, the latest version of NAM is a requirement.

    ## Lot Details and Information

    Lot size: 6 x 5 tiles

    Menu position: Building: Transportation,Building: Rail,Building: Strikable Transit,Building: FreightRail

    Jobs: $ : 15,R-$ : 15

    Plop cost: § 850

    Bulldoze cost: § 325

    Monthly cost: § 23

    Power consumption: 21 MWh/month

    Water consumption: 15 Gallons/month

    Pollution: Air: 0 over 0 tiles; Water: 2 over 6 tiles; Garbage: 4 over 6 tiles

    ## Credits

    Thanks go to *Rivit* for his custom pathing, and to *d\_j\_p1* for his patient testing of all WMP lots & mods;

    ## Support

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
