info:
  summary: The Crown at the Mill Pub
  description: |-
    The (for now) final lot in the WMP SPAM Workplaces series offers you The Crown at the Mill Pub, a small rural watering hole in an old, refurbished water mill. The lot, 3x3 in size, uses Pegasus' narrow stream as its water source - the only waterway I found useable for this type of project, employs 10 local yokels to serve its patrons, and is based upon a mill found on the web.

    All buildings & props have been rendered in HD.

    ***Note****: The main download includes a second lot/model aimed at lotters, and containing the original mill only. The model is off-set in order to make it usable with ploppable water, and omits the side building, terrace, pub signs, etc.*

    Recommended for use alongside `pkg=peg:stream-kit-ii-deluxe-edition`.

    **Lot Details and Information:**

    Lot size: 3 x 3 tiles

    Menu position: Building: Landmark,Building: CS$$

    Jobs: 10 C$

    Plop cost: $ 600

    Bulldoze cost: $ 285

    Monthly cost: $ 10

    Power consumption: 10 MWh/month

    Water consumption: 10 Gallons/month

    Pollution: Garbage: 4 over 4 tiles

    **Problems?**

    If you have problems with this lot it is most likely that you did not download ***all*** the dependencies or - just as likely - that we made a mistake. You can contact us via email at [comments@workingman-productions.co.uk](mailto:comments@workingman-productions.co.uk). Best include a screen-shot illustrating the problem.
