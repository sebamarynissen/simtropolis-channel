info:
  summary: SPAM Veterinary Clinic
  description: |-
    The third in the *WMP* *SPAM* *Workplace series* brings you a rural veterinary clinic: Dr Catellus and his staff of eighteen animal care workers will look after your farm animals, pets, and even the occasional exotic souvenir you brought back from that South American cruise last year.

    The 6x4 lot provides 18 jobs, and has a drive-through street connection (textures are aimed at SAM rural street overlays), and functions as a small clinic with a capacity of 500. All buildings & props (except for the trees) are rendered in HD.

    Updated July 28th, 2012

    **Lot Details and Information:**

    Lot size: 6 x 4 tiles

    Menu position: Building: Civic,Building: Health,Building: Strikeable Health,Building: Hospital,Building: AmbulanceMaker

    Jobs: 15 $$$ Jobs; 3, $ Jobs

    Plop cost: $ 950

    Bulldoze cost: $ 425

    Monthly cost: $ 50

    Power consumption: 20 MWh/month

    Pollution: Garbage: 5 over 8 tiles

    **Credits:**

    Thanks go to *CP* for his excellent flora & fauna; *Paeng* for his invaluable advice; and of course to *Dave* for his patient testing of all WMP lots & mods;
        

    **Problems?**

    If you have problems with this lot it is most likely that you did not download ***all*** the dependencies or - just as likely - that we made a mistake. You can contact us via email at [comments@workingman-productions.co.uk](mailto:comments@workingman-productions.co.uk). Best include a screen-shot illustrating the problem.
