info:
  summary: TenBrook Estate
  description: |-
    WMP TenBrook Estate is a small retirement community for wealthy pensioners whose savings "Golden Handshakes" amounted to some hard currency. While the occupancy is accordingly low, its boost to the Health EQ is considerable.

    Usage: The estate acts as a small hospital with a limited capacity bt a high effect on the health of the surrounding area. It is best placed on level ground and was not designed for slopes or hilly areas. The lot is transit enabled to allow cars and pedestrians to pass through.

    The file size of the required downloads reflects the fact that all lot buildings and props are rendered in HD.

    And yes, they are slightly larger than usual SC4 villas.

    Lot Details and Information:

    Lot size: 10 x 10 tiles

    Menu position: Building: Civic,Building: Health,Building: Strikable Health,Building: Hospital,Building: AmbulanceMaker

    Jobs: Jobs $ : 6,Jobs $$ : 4,Jobs $$$ : 2

    Plop cost: § 1835

    Bulldoze cost: § 850

    Monthly cost: § 50 for grounds maintenance, § 25 for ambulatory services

    Power consumption: 56 MWh/month

    Water consumption: 23 Gallons/month

    Pollution: Air: 0 over 0 tiles; Water: 0 over 0 tiles; Garbage: 9 over 10 tiles

    Capacity: 500

    Health Effect HQ: 21.5

    Hospital Coverage Radius: 450

    Hospital Patient Capacity: 800

    Credits

    Thanks to Rivit for the pathing of the lot; Dave for testing; everyone around the Pegasus site & teams for encouragement & suggestions; MattB325 for his superb flora; the BSC Teams; OrangeTSC for the additional cars; Shokthrpy for the air-con units; and DOSH for the Sims.

    Problems?

    If you have problems with this lot it is most likely that you did not download all the dependencies or - just as likely - that we made a mistake. You can contact us via email at [comments@workingman-productions.co.uk](mailto:comments@workingman-productions.co.uk). Best include a screen-shot illustrating the problem.

    Similar lots & props are available from the [WMP Exchange](http://workingman-productions.co.uk/downloads/shore_downloads.html).
