info:
  summary: Murimk Causeway Set
  description: |-
    **WMP Causeways v2.0** (props by **Murimk**, **bixel**; lotting by **DocRorlach**)

    *For further details, please read the provided readme AND IF you still have questions, ask [@Tyberius06](https://community.simtropolis.com/profile/660284-tyberius06/)*.

    **Important**: Please note: the game inhibits transit-enabled lots to sit next to each other. What you need to do is to leave at least a one-tile gap between two TE lots - this only applies to street and road lots - then connect these with either road or street and use the seawall piece on either water side to create uniform look.

    ## Credits

    -   *Original Creditings*: Thanks to **Murimk** for the seawalls, culverts, and his patience; **Porkissimo** for his French props; **bixel** for the fences; **d\_j\_p** & **rivit** for testing patiently; and of course everyone around the **Pegasus** site.
        
    ### Additional Credits:
        
        -   **DocRorlach** and the **WMP team** and his associates for creating the models, props and the original lots.
        -   David (djp) for keeping the original site alive so many years, and letting us rehosting the files on the exchanges
        -   Tyberius06 (STEX Custodian) and xxdita for the restoration/rehosting of these contents.
        -   Special gratitudes go to Vortext for restoring the **WMP\_Causeway\_Tutorial** and to Rivit for restoring the **z\_WMP Causeway RVTStreet.dat** providing support for his TSR streets on some of the lots.

    ## Support

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
