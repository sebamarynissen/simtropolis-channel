info:
  summary: The Cougar Fruit Packing Ltd.
  description: |-
    The Cougar Fruit Packing Ltd. is the latest in the WMP SPAM Workplaces series. Formerly an independent family concern, it was acquired by a global food brand in the late eighties and, during season, ships several local apple varieties from the local orchards to markets world-wide.

    Sitting on a 7x6 lot, the company employs 50 permanent staff from the nearby township rather than the transients favoured by the industry in general.

    While all props have been rendered in HD, the main building - due to its complexity - remains an SD export.

    **Lot Details and Information:**

    Lot size: 7 x 6 tiles

    Menu position: Transportation - FreightRail

    Jobs: $ : 45, $$ : 5

    Plop cost: $ 2,200

    Bulldoze cost: $ 1,000

    Monthly cost: $ 110

    Power consumption: 60 MWh/month

    Water consumption: 45 Gallons/month

    Pollution: Water: 5 over 10 tiles; Garbage: 15 over 10 tiles

    **Credits**:

    Thanks go to Rivit for his invaluable assistance in creating the special rail pathing; d\_j\_p1 for his patient testing of all WMP lots & mods; and Simcoug for suggesting the idea and providing research.

    **Problems?**

    If you have problems with this lot it is most likely that you did not download all the dependencies or - just as likely - that we made a mistake. You can contact us via email at [comments@workingman-productions.co.uk](mailto:comments@workingman-productions.co.uk?subject=WMP%20Packing%20Shed). Best to include a screen-shot illustrating the problem.
