info:
  summary: Power Lots
  description: |-
    This set of HD power lots contains:
    * A small power transformer providing 500MW for small rural communities, or to augment larger, far away power plants;
    * A medium transformer substation generating 1,500MW meant for more urban areas;
    * A cellphone repeater antenna - eye-candy only;
    * Several old-fashioned power poles, modelled on the US rural transmission lines (eye-candy only).

    ## Lot Details and Information

    -   Lot Sizes:  Small Transformer: 1 x 1 tiles; Transformer Substation: 1x2 tiles; Power Poles: 1x1 tiles
    -   Menu Position:  Building: Utility,Building: Power
    -   Plop Cost:  Small Transformer: § 260; Transformer Substation: § 450
    -   Bulldoze Cost:  Small Transformer: § 185; Transformer Substation: § 225; Power Poles: §5
    -   Monthly Cost:  Transformers: § 75; Power Poles: 5
    -   Park Effect:  Power Poles only : 5 over 5 tiles
    -   Water Consumption:  Transformers: 3 Gallons/month
    -   Pollution: None
    -   Power Generated:  Small Transformer: 500MW; Transformer Substation: 1,500MW

    ## Support

    These WMP/DocRorlach creations are now legacy contents and therefore their support is very limited, however support from the wider community can be requested **[here on SC4 Devotion](https://www.sc4devotion.com/forums/index.php?topic=18355.0 "Workingman Productions (WMP) & SC4Tools websites and content")** or in the **[STEX Custodian General Support Topic](https://community.simtropolis.com/forums/topic/758502-stex-custodian-general-support-topic)**. Best include a screen-shot illustrating the problem.
